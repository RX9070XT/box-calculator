<style>
  @font-face {
    font-family: 'TT Hoves';
    src: url('TTHoves-Regular.woff2') format('woff2'),

    /* ── ТЕМА (по умолчанию — светлая) ── */
  --theme-right-bg: #6E798A;   /* правый фон */
  --theme-main-bg:  #F7F7F7;      /* основное поле */
  --theme-field-bg: #fff;      /* фон полей ввода */
  --theme-text:     #000;      /* цвет текста */
  --theme-toggle-off: #ccc;    /* выкл. тогл */
  --theme-toggle-on:  #A69C87; /* вкл. тогл */
}

/* Тёмная тема */
body[data-theme="dark"] {
  --theme-right-bg: #45484D;
  --theme-main-bg:  #6E798A;
  --theme-field-bg: #5E6875;   /* на 15% темнее основного фона */
  --theme-text:     #fff;      /* белый шрифт */
  --theme-toggle-off: #5E6875; /* выкл. = темнее фона */
  --theme-toggle-on:  #703D30; /* вкл. */
}
/* Тема для глаз */
body[data-theme="eye"] {
  --theme-right-bg: #6E798A;
  --theme-main-bg:  #A69C87;
  --theme-field-bg: #8D8573;   /* на 15% темнее основного фона */
  --theme-text:     #000;
  --theme-toggle-off: #8D8573;
  --theme-toggle-on:  #703D30; /* вкл. */
}

    line-height: 0;

  }
  /* обе картинки масштабируются по ОДНОЙ высоте → одинаковый масштаб у всех кнопок */
  .img-btn img {
    display: block;
    height: calc(var(--btn-img-h) * var(--btn-scale));  /* единый масштаб */
    width: auto;                                        /* ширина пропорционально */

       /* светлая картинка всегда видна; тёмная плавно появляется ПОВЕРХ неё */
  .img-btn .img-normal {
    opacity: 1;
  }
  .img-btn .img-hover {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.25s ease-in-out;   /* плавность в ОБЕ стороны */
    will-change: opacity;                     /* подсказка браузеру — без рывка */
  }
  .img-btn:hover:not(:disabled) .img-hover {
    opacity: 1;                               /* появление поверх светлой */
  }
  /* при уводе мыши transition тот же 0.25s → гаснет так же плавно */
  .img-btn:active {
    transform: translateY(1px);
  }
    /* неактивная кнопка-картинка → показываем тёмный вариант (_2.png) */
    .img-btn:disabled {
    cursor: not-allowed;
  }
  .img-btn:disabled .img-normal {
    opacity: 1;            /* светлую НЕ прячем — тёмная ляжет поверх */
  }
  .img-btn:disabled .img-hover {
    opacity: 1;            /* тёмная плавно проявляется поверх светлой */
    transition: opacity 0.25s ease-in-out;
  }

  /* ===== КАСТОМНЫЕ СПИСКИ ===== */
  .cs-wrap { position: relative; width: var(--field-w); z-index: 1; }
  .cs-wrap.open { z-index: 9999; }
  .cs-wrap select.cs-native {
  position: absolute !important; opacity: 0 !important; pointer-events: none !important;
  width: 0 !important; height: 0 !important; margin: 0 !important; padding: 0 !important;
  border: 0 !important; overflow: hidden; clip: rect(0 0 0 0);
}
.cs-display {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 6px; height: 32px; box-sizing: border-box;
    border: 1px solid #ccc; border-radius: 4px;
    font-size: 16px; cursor: pointer; user-select: none;

  .cs-arrow {
    margin-left: 8px;

    display: inline-flex;
    align-items: center;

  .cs-list {
    position: absolute; left: 0; top: calc(100% + 4px); z-index: 9999;
    width: 100%; box-sizing: border-box; max-height: 133px; overflow-y: auto;   /* 5 строк без скролла, дальше скролл */
    border: 1px solid #ccc; border-radius: 8px; padding: 4px;   /* симметричный отступ со всех сторон */
    background: rgba(255,255,255,0.35);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18); display: none;
  }
  /* ── тонкий кастомный скроллбар, вписанный в скругление ── */
  .cs-list::-webkit-scrollbar { width: 6px; }
  .cs-list::-webkit-scrollbar-track { background: transparent; margin: 6px 0; }  /* отступ от скруглённых углов */

    border-radius: 6px;
  }
  .cs-list::-webkit-scrollbar-thumb:hover { background: rgba(120,120,120,0.8); }

  .cs-wrap.cs-disabled .cs-display {
    background: #f0f0f0; color: #aaa; cursor: not-allowed; pointer-events: none;

}
.ios-toggle {
  /* ЕДИНСТВЕННОЕ место настройки геометрии тогла: */
  --tgl-w: 46px;     /* длина тогла (минимум ≈ --tgl-h + ход; меньше --tgl-h ползунку некуда ехать) */
  --tgl-h: 24px;     /* высота тогла */
  --tgl-pad: 3px;    /* отступ квадрата от краёв — ВЕЗДЕ одинаковый */
  --tgl-r: 6px;      /* скругление трека и квадрата */
  position: relative;
  display: inline-block;
  width: var(--tgl-w);
  height: var(--tgl-h);
  flex-shrink: 0;
  cursor: pointer;
  line-height: 0;
  vertical-align: middle;
}
/* защита геометрии тогла от общих правил label (у .isle-base label / .adv-inner label
   специфичность выше, чем у .ios-toggle — они прибивали width к 70px) */
   label.ios-toggle,
.isle-base label.ios-toggle,
.adv-inner label.ios-toggle {
  width: var(--tgl-w);
  height: var(--tgl-h);
}
.ios-toggle input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.ios-track {
  position: absolute;
  inset: 0;
  border-radius: var(--tgl-r);
  background: var(--theme-toggle-off);
  transition: background 0.28s ease;
  border: none;
}
.ios-thumb {
  position: absolute;
  top: var(--tgl-pad);
  left: var(--tgl-pad);
  width: calc(var(--tgl-h) - var(--tgl-pad) * 2);    /* квадрат из высоты − 2×3px */
  height: calc(var(--tgl-h) - var(--tgl-pad) * 2);
  border-radius: var(--tgl-r);
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.28);
  transform: none;
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
}
.ios-toggle input:checked ~ .ios-track {
  background: var(--theme-toggle-on);
}
.ios-toggle input:checked ~ .ios-thumb {
  /* ход = длина − высота → правый зазор автоматически = --tgl-pad */
  transform: translateX(calc(var(--tgl-w) - var(--tgl-h)));
}

    /* цвет текста по теме */

  body[data-theme="dark"] .results-text .res-title,

    /* ===== ВСПЛЫВАЮЩИЕ ОШИБКИ (тосты) ===== */
    :root {
    --err-w: 134mm;       /* ширина полосы ошибки (минимум) */
    --err-h: 13mm;        /* высота полосы ошибки */
    --err-gap: 8px;       /* зазор между тостами при стекинге */
    --err-top: 12px;      /* отступ стопки от верха окна */
  }
  .err-stack {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 100000;
    display: flex;
    flex-direction: column-reverse;   /* новый тост снизу, старые уезжают вверх */
    align-items: flex-end;
    gap: var(--err-gap);
    width: -moz-fit-content;
    width: fit-content;
    max-width: 90vw;
    pointer-events: none;
  }
  .err-toast {
    min-width: var(--err-w);
    max-width: 520px;
    min-height: var(--err-h);
    box-sizing: border-box;
    padding: 8px 22px;
    border-radius: 12px;
    background: rgba(200, 40, 40, 0.55);            /* красный полупрозрачный */
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 90, 90, 0.6);
    color: #fff;
    font-family: 'TT Hoves', sans-serif;
    font-size: 16pt;                                /* размер шрифта 18pt */
    line-height: 1.25;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: pre-line;                          /* переносы \n работают */
    pointer-events: auto;                           /* сам тост кликабелен */
    cursor: pointer;                                /* клик = закрыть досрочно */
    /* появление */
    opacity: 0;
    transform: translateY(-14px);
    /* появление быстрое, исчезновение ПЛАВНОЕ (2 сек) — задаётся классами */
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(.25,.1,.25,1);
    will-change: opacity, transform;
  }
  .err-toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .err-toast.hide {                                 /* плавный уход — 2 секунды */
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 2s ease, transform 2s ease;
  }
          /* ===== ОСТРОВОК КОНСТРУКТОРА (раздвижной) ===== */
  :root {
    --isle-pad: 22px;    /* отступ от краёв острова — НЕ трогать, растит весь остров */
    --col-gap: 12mm;     /* зазор между колонками = 15мм визуально */
    --isle-radius: 8px;
    --isle-font: 18px;
    --isle-field-font: 16px;   /* шрифт ВНУТРИ полей и списков */
    --isle-label-gap: 24px;
    --isle-row-gap: 8px;
    --isle-base-w: calc(var(--label-w) + var(--isle-label-gap) + var(--field-w));

    --adv-grow-right: calc(125mm + 50px);  /* FALLBACK: реальную ширину раскрытия считает JS (lockIsleHeight) */
    --adv-grow-down:  72mm;    /* рост вниз ×2 */
    --adv-bar: 23px;         /* правая полоса → 23px на экране (zoom 0.835) */
    --adv-bar-bottom: 23px;  /* нижняя полоса = правой */
  }

    /* обёртка островка резервирует ЗАКРЫТЫЙ размер — layout не двигается никогда */
    .isle-holder {
    position: relative;
    width: calc(var(--isle-base-w) + var(--isle-pad) + var(--adv-bar));
    /* высоту holder задаёт JS по закрытому островку */
  }
  .constructor-isle {
    position: absolute;          /* вынут из потока → .columns больше не толкает чертёж */
    top: 0; left: 0;
    background: #fff;
    border-radius: var(--isle-radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    z-index: 600;
    width: calc(var(--isle-base-w) + var(--isle-pad) + var(--adv-bar));
    padding: 0;
    transition: width 0.42s cubic-bezier(.4,0,.2,1),
                height 0.42s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  /* когда внутри острова открыт кастомный список — не режем его границей острова */
  .constructor-isle.cs-open { overflow: visible; }
  .constructor-isle.adv-open {
    width: calc(var(--isle-base-w) + var(--isle-pad) + var(--adv-grow-right));
    /* высоту в открытом виде задаёт JS (база + adv-grow-down) */
  }

  .isle-base {
    display: flex;
    flex-direction: column;
    gap: var(--isle-row-gap);
    padding: var(--isle-pad) 0 0 var(--isle-pad);
    width: calc(var(--isle-base-w) + var(--isle-pad));
    box-sizing: border-box;
  }
  .isle-title {
    font-size: 24px; line-height: 32px; color: #333; margin: 0; font-weight: normal;
    /* ⚙️ низ «Калькулятор» = низ «0200» справа: − вверх, + вниз (layout не трогает) */
    transform: translateY(-7px);
  }
  .isle-base .input-group { justify-content: flex-start; gap: var(--isle-label-gap); width: auto; }
  .isle-base label { font-size: var(--isle-font); width: var(--label-w); }
  .isle-base input,
  .isle-base select,
  .isle-base .cs-display,
  .isle-base .cs-option { font-size: var(--isle-field-font); }
  .isle-base .toggle-label { font-size: var(--isle-font); width: auto; }
  /* доп. поля базы — видны ТОЛЬКО при раскрытии островка */
  .isle-extra {
    display: flex;
    flex-direction: column;
    gap: var(--isle-row-gap);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease 0.15s;
  }
  .constructor-isle.adv-open .isle-extra { opacity: 1; visibility: visible; }

   /* ===== Г-ОБРАЗНАЯ ЗОНА-КНОПКА (белая, с тонкими линиями) ===== */
   .adv-accordion {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    pointer-events: none;
  }
  .adv-head {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    pointer-events: auto;
    background: transparent;      /* было серым → прозрачно (белый островок под ним) */
    border: none;
    border-radius: var(--isle-radius);
    cursor: pointer;
    padding: 0;
    width: 100%;
    white-space: nowrap;
    box-shadow: none;
    /* Г-зона (правая + нижняя полоса) — как раньше через clip-path,
       чтобы кликалась только рамка, а не вся площадь островка */
    -webkit-clip-path: polygon(
      calc(100% - var(--adv-bar)) 0,
      100% 0, 100% 100%, 0 100%,
      0 calc(100% - var(--adv-bar)),
      calc(100% - var(--adv-bar)) calc(100% - var(--adv-bar))
    );
    clip-path: polygon(
      calc(100% - var(--adv-bar)) 0,
      100% 0, 100% 100%, 0 100%,
      0 calc(100% - var(--adv-bar)),
      calc(100% - var(--adv-bar)) calc(100% - var(--adv-bar))
    );
  }
  .adv-head:hover { background: transparent; filter: none; }  /* никакого затемнения */

  /* SVG с тонкими линиями-границами (координаты рисует JS) */
  .adv-lines {
    display: none;
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  .adv-lines line {
    stroke: #cfcfcf;      /* тонкая серая */
    stroke-width: 1;
    stroke-linecap: round;
  }
          /* уголок-стрелка в правом-нижнем углу (позицию left/top уточняет JS) */
          .adv-corner {
    position: absolute;
    right: 8px;                   /* ⚙️ отступ стрелки от края: больше = дальше от края */
    bottom: 8px;
    pointer-events: auto;          /* ← клик по стрелке = переключение островка */
    cursor: pointer;
    z-index: 700;                  /* поверх кнопки */
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    transform-origin: 70% 70%;     /* вращаемся вокруг центра значка */
  }
  .adv-corner path { transition: stroke 0.2s; }
  /* увеличение уголка при наведении НА САМ уголок */
  .adv-corner:hover {
    transform: scale(1.35);
  }
  /* при раскрытии — уголок разворачивается на 180° (указывает «свернуть») */
  .constructor-isle.adv-open .adv-corner {
    transform: rotate(180deg);
  }
  .constructor-isle.adv-open .adv-corner:hover {
    transform: rotate(180deg) scale(1.35);
  }

  /* содержимое настроек — в раскрытой зоне справа */
  .adv-inner {
    position: absolute;
    top: var(--isle-pad);
    left: calc(var(--isle-base-w) + var(--isle-pad) + var(--col-gap));
    right: var(--isle-pad);
    display: flex;
    flex-direction: column;
    gap: var(--isle-row-gap);
    pointer-events: auto;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease 0.15s;
  }
  .constructor-isle.adv-open .adv-inner { opacity: 1; visibility: visible; }
  .adv-inner .input-group { justify-content: flex-start; gap: var(--isle-label-gap); width: auto; }
  .adv-inner label { width: var(--label-w); }
  .adv-inner label,
  .adv-inner .toggle-label { font-size: var(--isle-font); }
  .adv-inner input,
  .adv-inner select,
  .adv-inner .cs-display,
  .adv-inner .cs-option { font-size: var(--isle-field-font); }

                /* ── ПОЛЯ СЕКЦИЙ: клапан (input) и списки (кастомные .cs-wrap) ── */
    /* клапан-инпут — узкий (как тогл), к левому краю ячейки */
    .adv-section .adv-num {
    width: 46px;                 /* = ширине тогла --tgl-w */
    justify-self: start;
  }
  .adv-section .cs-wrap {
    width: var(--field-w);
    justify-self: start;
    /* сдвиг влево = (135px column-gap секции) − (24px зазор левой колонки) = 111px
       → список встаёт близко к тексту, как «Поддон», и не вылазит за тоглы */
    margin-left: -63px;
  }
  .adv-num {
    height: 32px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: var(--isle-field-font);
    font-family: 'TT Hoves', sans-serif;
    color: var(--theme-text);
    background: rgba(255,255,255,0.90);
    padding: 6px 3px;
    text-align: center;
  }
  .adv-num::placeholder { color: #757575; font-size: var(--isle-field-font); }
    /* кастомный список в секциях: обычная высота/паддинги, как у списков островка */
    .adv-section .cs-wrap .cs-display {
    height: 32px;
    padding: 6px 6px;
    background: rgba(255,255,255,0.90);
  }
  .adv-section .cs-wrap .cs-label {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .adv-section .cs-wrap .cs-arrow { margin-left: 8px; }
  /* единый размер плейсхолдера "-" в списках секций (как у FEFCO) */
  .adv-inner .cs-display,
  .adv-inner .cs-label { font-size: var(--isle-field-font); }
  /* тёмная/eye-темы: полупрозрачный тёмный фон полей секций */
  body[data-theme="dark"] .adv-num,
  body[data-theme="eye"]  .adv-num,
  body[data-theme="dark"] .adv-section .cs-wrap .cs-display,
  body[data-theme="eye"]  .adv-section .cs-wrap .cs-display {
    background: rgba(94,104,117,0.90);
  }

    /* ===== СЕКЦИИ НАСТРОЕК (0200 / 0400) ===== */
    .adv-section {
    display: grid;
    grid-template-columns: max-content max-content;  /* текст | тогл */
    column-gap: 135px;
    row-gap: var(--isle-row-gap);      /* тот же зазор, что слева */
    grid-auto-rows: 32px;              /* та же высота строки, что слева */
    align-items: center;
    margin-top: 0;                     /* старт синхронно с левой колонкой */
    width: max-content;
  }
  .adv-section .adv-section-title { grid-column: 1 / -1; }
  /* строки «растворяются» — подпись и тогл сами встают в колонки грида */
  .adv-section .toggle-row { display: contents; }
  .adv-section-title {
    font-size: 18px;
    color: #333;
    padding-bottom: 6px;
    border-bottom: 1px solid #cfcfcf;   /* серая горизонтальная линия под заголовком */
  }
    /* ===== БЕЛОЕ ПОЛЕ ПОД КНОПКАМИ ===== */
    .info-panel {
    background: #fff;
    border-radius: var(--isle-radius);          /* скругление как у чертежа/острова */
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    width: var(--preview-w);                     /* ширина = поле чертежа */
    height: 300px;                               /* высота 300px */
    transform: translateX(var(--preview-shift-x)); /* тот же сдвиг, что у чертежа */
    box-sizing: border-box;
    margin-top: 16px;                            /* отступ от кнопок */
    padding: 20px;
  }
    /* содержимое белого окна с формулами паллета */
    .info-panel { overflow-y: auto; }
  .info-panel .ip-title {
    margin: 0 0 12px 0;
    font-size: 18px; font-weight: normal; color: #333;
  }
  .info-panel .ip-col { display: flex; flex-direction: column; gap: 3px; }
  .info-panel .ip-row {
    display: flex; justify-content: space-between; gap: 20px;
    font-size: 15px; line-height: 1.5; color: #222;
  }
  .info-panel .ip-key { color: #555; }
  .info-panel .ip-val { font-weight: bold; color: #000; white-space: nowrap; }
  .info-panel .ip-formula {
    font-family: 'Courier New', monospace; font-size: 14px;
    color: #703D30; padding-left: 10px; line-height: 1.5;
  }
  .info-panel .ip-sub { font-size: 13px; color: #888; padding-left: 10px; line-height: 1.4; }
  .info-panel .ip-sep { height: 1px; background: #e6e6e6; margin: 8px 0; }
  .info-panel .ip-warn { color: #b03030; font-weight: bold; font-size: 15px; }
  </style>

<script>
(function () {

// ============================================================
// ВСПЛЫВАЮЩИЕ ОШИБКИ (тосты). Заменяют alert().
//   - до 3 штук одновременно, новые падают сверху, старые (снизу) уходят
//   - каждый висит 10 сек, затем плавно исчезает
//   - клик по тосту закрывает его досрочно
// ============================================================
var ERR_MAX = 3;          // максимум тостов на экране
var ERR_LIFE = 5000;      // время жизни, мс (7 сек)
var ERR_FADE = 2000;      // длительность плавного исчезновения, мс (2 сек)
function showError(msg) {
  var stack = document.getElementById('errStack');
  if (!stack) { console.error(msg); return; }

  var toast = document.createElement('div');
  toast.className = 'err-toast';
  toast.textContent = String(msg);

  // новый тост — СВЕРХУ стопки
  stack.insertBefore(toast, stack.firstChild);

  // если тостов больше лимита — самые НИЖНИЕ (лишние) убираем СРАЗУ (жёстко),
  // чтобы стек никогда не разрастался и не перекрывал страницу
  while (stack.children.length > ERR_MAX) {
    var extra = stack.lastElementChild;
    if (extra._timer) clearTimeout(extra._timer);
    if (extra.parentNode) extra.parentNode.removeChild(extra);   // без анимации
  }

  // анимация появления
  requestAnimationFrame(function () { toast.classList.add('show'); });

  // авто-удаление через ERR_LIFE
  toast._timer = setTimeout(function () { removeToast(toast); }, ERR_LIFE);

  // клик — закрыть досрочно
  toast.addEventListener('click', function () { removeToast(toast); });
}
function removeToast(toast) {
  if (!toast || toast._removing) return;
  toast._removing = true;
  if (toast._timer) clearTimeout(toast._timer);
  toast.classList.remove('show');
  toast.classList.add('hide');
  setTimeout(function () {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, ERR_FADE + 100);   // = длительность fade (2с) + запас
}
// временный алиас: чтобы старые вызовы alert() внутри модуля шли в тост
var alert = showError;   // ⚠️ переопределяем alert ТОЛЬКО внутри этого модуля

var SLOT_W = 8;
// Расчёты справа от чертежа показываются ТОЛЬКО после «Предпросмотр» при включённом тогле.
// Пересчёт значений при штампе/поддоне обновляет уже показанный блок, но сам НЕ включает его.
var CALC_SHOWN = false;
    // Режим цвета линий для группы 02ХХ: false = серый (#454545), true = как в 04ХХ
    var COLOR_SWAP_02 = false;
    // Возвращает цвета/стиль линий для 02ХХ в зависимости от флага.
  // foldDash = true → биговка пунктиром; false → сплошная (как в 04ХХ).
  function colors02() {
    if (COLOR_SWAP_02) {
      return { cut: '#000000', fold: '#cc0000', dim: '#4FBEFF', foldDash: false };
    }
    return { cut: '#454545', fold: '#454545', dim: '#454545', foldDash: true };
  }
  // Режим цвета линий для группы 04ХХ: false = как в 04ХХ (чёрный/красный/голубой), true = серый как 02ХХ
  var COLOR_SWAP_04 = false;
  // Цвета/стиль линий для 04ХХ.
  function colors04() {
    if (COLOR_SWAP_04) {
      return { cut: '#454545', fold: '#454545', dim: '#454545', foldDash: true };
    }
    return { cut: '#000000', fold: '#cc0000', dim: '#4FBEFF', foldDash: false };
  }
  var GLUE_ANGLE_Y = 80;
  var PT = 0.400;
  var CUT_SW = 2 * PT;
  var DIM_SW = 2 * PT;
  // Множитель толщины линий специально для PDF (1 = как на экране)
  var PDF_LINE_BOOST = 1.5;
  var ICON_SCALE    = 0.75; // размер значка (доля от меньшей стороны: панель/флап)
  var ICON_PAD_X    = 0.015; // отступ от ПРАВОГО края панели (в долях размера значка)
  var ICON_PAD_Y    = 0.15; // доп. смещение по вертикали (в долях; центрируется автоматически)

  var ICON_MOON = "\uD83C\uDF18";
  var ICON_SUN  = "\u2600\uFE0F";

  function roundFlap(x) { return Math.floor(x); }

    // Ручной клеевой клапан для 02XX: читает поле #flapManualMM.
  // Возвращает число 25..100 или null (тогда работает формула профиля).
  function manualGlue() {
    var el = document.getElementById('flapManualMM');
    if (!el) return null;
    var v = parseFloat(el.value);
    if (!isFinite(v)) return null;
    if (v < 25) v = 25;
    if (v > 70) v = 70;   // потолок клапана = 70
    return v;
  }

  // ============================================================
  // ⚙️ ПОЛКА ПЕРЕГИБА C/C (рез/биговка): шаг чередования, мм.
  //    0 = выкл (обычная биговка), 5 = С/С 5х5, 10 = С/С 10х10.
  function shelfCCStep() {
    var t10 = document.getElementById('toggleShelf10');
    var t5  = document.getElementById('toggleShelf5');
    if (t10 && t10.checked) return 10;
    if (t5  && t5.checked)  return 5;
    return 0;
  }
         // Вертикальная линия перегиба C/C (Cut & Crease).
  // ⚠️ Линия ВСЕГДА начинается И заканчивается БИГОВКОЙ.
  //    Старт: биговка ровно step. Дальше ЖАДНО: пока в остатке помещается
  //    «рез step + концевая биговка ≥ endMin» — добавляем рез (место не простаивает).
  //    Последняя биговка добирает остаток (endMin..~2×step).
  function ccVertLine(x, y1, y2, step) {
    var endMin = step / 2;                                  // ⚙️ мин. длина КОНЦЕВОЙ биговки
    var total = y2 - y1;
    if (total < step * 2 + endMin) return L(x, y1, x, y2, 'fold');  // рез не влезает → сплошная
    var out = '';
    var y = y1;
    out += L(x, y, x, y + step, 'fold'); y += step;         // старт: биговка step
    while (y2 - y >= step + endMin) {                       // рез влезает + остаётся концевая биговка
      out += L(x, y, x, y + step, 'cut'); y += step;        // рез step
      var foldEnd = (y2 - (y + step) >= step + endMin) ? (y + step) : y2;  // добить остаток в конце
      out += L(x, y, x, foldEnd, 'fold');
      y = foldEnd;
    }
    if (y < y2 - 0.01) out += L(x, y, x, y2, 'fold');       // хвост-биговка (страховка)
    return out;
  }

  var PROFILES = {
    'B':  { glue: 30, wallH: function (l,w,h){return h+3;}, flapH: function (l,w,h){return roundFlap((w+4)/2);}, panels: function (l,w,h){return [w+2,l+3,w+3,l+2];} },
    'E':  { glue: 30, wallH: function (l,w,h){return h+2;}, flapH: function (l,w,h){return roundFlap((w+2)/2);}, panels: function (l,w,h){return [w+1,l+2,w+2,l+1];} },
    'C':  { glue: 35, wallH: function (l,w,h){return h+4;}, flapH: function (l,w,h){return roundFlap((w+5)/2);}, panels: function (l,w,h){return [w+2,l+4,w+4,l+2];} },
    'BC': { glue: 45, wallH: function (l,w,h){return h+9;}, flapH: function (l,w,h){return roundFlap((w+12)/2);}, panels: function (l,w,h){return [w+4,l+6,w+6,l+4];} },
    'EB': { glue: 40, wallH: function (l,w,h){return h+7;}, flapH: function (l,w,h){return roundFlap((w+7)/2);}, panels: function (l,w,h){return [w+3,l+5,w+5,l+3];} }
  };
  // Добавка к высоте стенки для КВАДРАТНЫХ коробов (l === w)
  var SQUARE_WALL_ADD = { 'E': 4, 'B': 6, 'C': 9, 'BC': 15, 'EB': 10 };

  // Возвращает wallH с учётом квадратности
  function wallHeight(P, l, w, h, profileKey) {
    if (l === w && SQUARE_WALL_ADD[profileKey] != null) {
      return h + SQUARE_WALL_ADD[profileKey];
    }
    return P.wallH(l, w, h);
  }
  function calc(l, w, h, profileKey) {
    var P = PROFILES[profileKey] || PROFILES['B'];
    var mg = manualGlue();
    var GLUE = (mg != null) ? mg : P.glue;   // ручной клапан приоритетнее формулы
    var flapH = P.flapH(l, w, h);
    var wallH = wallHeight(P, l, w, h, profileKey);
    var totalH = flapH * 2 + wallH;
    var panels = P.panels(l, w, h);
    var bodyW = panels.reduce(function (a, b) { return a + b; }, 0);
    var totalW = GLUE + bodyW;
    var slantRise = GLUE / Math.tan(GLUE_ANGLE_Y * Math.PI / 180);
    return { GLUE: GLUE, flapH: flapH, wallH: wallH, totalH: totalH, panels: panels, totalW: totalW, slantRise: slantRise };
  }

  // ── Припуски и клеевые клапаны для ПОЛОВИНОК 0201 ──
  // glue — клеевой клапан; addW — припуск к ширине; addL — припуск к длине
  var HALF_PARAMS = {
    'E':  { glue: 40, addW: 2, addL: 2 },
    'B':  { glue: 40, addW: 3, addL: 3 },
    'C':  { glue: 45, addW: 4, addL: 4 },
    'EB': { glue: 40, addW: 5, addL: 5 },
    'BC': { glue: 50, addW: 6, addL: 6 }
  };

  // Половина короба 0201: клеевой клапан + панели [W, L], правый край — прямая линия.
  function calcHalf(l, w, h, profileKey) {
    var P = PROFILES[profileKey] || PROFILES['B'];
    var HP = HALF_PARAMS[profileKey] || HALF_PARAMS['B'];
    var mg = manualGlue();
    var GLUE = (mg != null) ? mg : HP.glue;   // ручной клапан приоритетнее
    var flapH = P.flapH(l, w, h);
    var wallH = wallHeight(P, l, w, h, profileKey);
    var totalH = flapH * 2 + wallH;
    // панели половинки: ширина (W+addW), длина (L+addL)
    var panels = [w + HP.addW, l + HP.addL];
    var bodyW = panels.reduce(function (a, b) { return a + b; }, 0);
    var totalW = GLUE + bodyW;
    var slantRise = GLUE / Math.tan(GLUE_ANGLE_Y * Math.PI / 180);
    return { GLUE: GLUE, flapH: flapH, wallH: wallH, totalH: totalH, panels: panels, totalW: totalW, slantRise: slantRise, half: true };
  }

       // ── ПОРОГ ДЕЛЕНИЯ (упрощённо, на сейчас) ──
    // Делим на ДВЕ половины ТОЛЬКО если развёртка превысила ОБА порога СРАЗУ:
    //   totalW > 2500  И  totalH > 1200.
    // Если превышен только один из них (или ни одного) — строим ПОЛНЫЙ короб.
    var SPLIT_MAX_W = 2400;   // порог по ДЛИНЕ развёртки (горизонталь, totalW)
  var SPLIT_MAX_H = 1200;   // порог по ШИРИНЕ развёртки (вертикаль, totalH)

  // true → короб НАДО делить (оба порога превышены одновременно)
    // Ручной флаг «строить из 2-х половин» (тогл в расширенных настройках)
    var FORCE_TWO_HALVES = false;
  function needSplit0201(totalW, totalH) {
    // Если включён тогл «Строить из 2-х половин» — делим принудительно.
    if (FORCE_TWO_HALVES) return true;
    // (авто-порог отключён)
    return false;
  }

  // Решает: ПОЛНЫЙ короб или ДВЕ половинки.
  function calc0201(l, w, h, profileKey) {
    var full = calc(l, w, h, profileKey);   // полный короб со старыми припусками
    if (!needSplit0201(full.totalW, full.totalH)) {
      full.twoHalves = false;
      return full;                            // полный короб через buildSVG
    }
    // делим → строим из двух половин
    var half = calcHalf(l, w, h, profileKey);
    half.twoHalves = true;
    return half;
  }

  function L(x1, y1, x2, y2, cls) {
    return '<line class="' + cls + '" x1="' + x1.toFixed(3) + '" y1="' + y1.toFixed(3) + '" x2="' + x2.toFixed(3) + '" y2="' + y2.toFixed(3) + '" />';
  }
    window.__Lref = L;

  window.__Lref = L;   // прямая ссылка на глобальный L для build0422Core (без теневой рекурсии)

    // Значок направления гофры. Исходный viewBox 0 0 3000 3000.
  // x,y — левый верхний угол; size — итоговый размер стороны (в мм чертежа).
  function corrugationIcon(x, y, size) {
    var s = size / 3000;
    var sw = 55.28; // толщина линий из исходника
    var inner =
      '<line x1="890.09" y1="2409.61" x2="890.09" y2="780.7"/>' +
      '<path d="M890.09 780.7c451.44,534.5 948.55,1031.61 1483.06,1483.06 -157.34,-477.5 -226.55,-980.84 -203.92,-1483.07 -365.4,327.3 -913.75,327.31 -1279.15,0.02"/>' +
      '<path d="M892.98 2409.61c23.55,-7.29 63.2,-11.66 105.78,-11.66 42.57,0 82.21,4.37 105.76,11.66 0.19,12.04 47.16,21.69 105.77,21.73 58.61,-0.04 105.58,-9.69 105.77,-21.73 23.55,-7.29 63.19,-11.66 105.77,-11.66 42.58,0 82.23,4.37 105.78,11.66 0.19,12.04 47.16,21.69 105.77,21.72 58.6,-0.03 105.57,-9.68 105.75,-21.72 23.56,-7.29 63.2,-11.66 105.78,-11.66 42.58,0 82.23,4.37 105.78,11.66 0.18,12.04 47.16,21.69 105.76,21.72 58.6,-0.03 105.58,-9.68 105.76,-21.72 23.55,-7.28 63.2,-11.65 105.76,-11.66 42.58,0.01 82.23,4.38 105.77,11.66"/>' +
      '<line x1="1101.96" y1="2408.84" x2="1101.95" y2="1025.84"/>' +
      '<line x1="1313.82" y1="2414.03" x2="1313.82" y2="1260.16"/>' +
      '<line x1="1525.7" y1="2409.03" x2="1525.7" y2="1484.45"/>' +
      '<line x1="1737.57" y1="2413.3" x2="1737.57" y2="1685.69"/>' +
      '<line x1="1949.43" y1="2409.22" x2="1949.43" y2="1895.65"/>' +
      '<line x1="2161.31" y1="2412.4" x2="2161.31" y2="2078.14"/>' +
      '<line x1="2373.15" y1="2409.61" x2="2373.15" y2="2268.24"/>';

           'style="stroke:#454545;stroke-width:' + sw + ';stroke-linecap:round;stroke-linejoin:round;fill:none;">' +
           inner + '</g>';
  }

  // Стрелка-треугольник на конце размерной линии.
  // (x,y) — позиция острия; angleDeg — куда смотрит остриё (0=вправо,180=влево,90=вниз,-90=вверх);
  // size — длина стрелки (в мм чертежа).
  function arrowTri(x, y, angleDeg, size) {
    var w = size * 0.35 * 0.45;     // ширина основания -30%
    var a = angleDeg * Math.PI / 180;
    var dx = Math.cos(a), dy = Math.sin(a);      // направление остриё
    var nx = -dy, ny = dx;                       // перпендикуляр
    var tipX = x, tipY = y;
    var bx = x - dx * size, by = y - dy * size;
    var p1x = bx + nx * w, p1y = by + ny * w;
    var p2x = bx - nx * w, p2y = by - ny * w;
    return '<polygon class="dimarr-tri" points="' +
      tipX.toFixed(3) + ',' + tipY.toFixed(3) + ' ' +
      p1x.toFixed(3) + ',' + p1y.toFixed(3) + ' ' +
      p2x.toFixed(3) + ',' + p2y.toFixed(3) + '" />';
  }

    // Подгоняет viewBox под пропорции поля #preview (та же логика, что в 0427/0422/0409) —
  // чертёж занимает максимум места и по ширине, и по высоте.
  function fitViewBox(tW, tH, extraR, extraB) {
    var pad = Math.max(tW, tH) * 0.04;
    var drawX = -pad, drawY = -pad;
    var drawW = tW + extraR + pad * 2;
    var drawH = tH + extraB + pad * 2;
    var boxAR = 1450 / 800;
    try {
      var pv = document.getElementById('preview');
      if (pv) {
        var cs = getComputedStyle(pv);
        var pX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
        var pY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
        var iW = pv.clientWidth - pX, iH = pv.clientHeight - pY;
        if (iW > 0 && iH > 0) boxAR = iW / iH;
      }

  // штриховка клеевого клапана (вынесена из buildSVG)
  function hatchGlue(GLUE, y1, y2, slantRise) {

      if (Math.abs(denomB) > 1e-9) {

        if (tBot >= 0) tEnd = Math.min(tEnd, tBot);

      if (!isFinite(tEnd) || tEnd <= 0) continue;
      out.push(L(sx, sy, sx + hbDX * tEnd, sy + hbDY * tEnd, 'cut'));

    // штриховка клапана 2 — ТАКАЯ ЖЕ как у первого (вниз-влево), но в зоне [gl2L..gl2R]

    var GLUE = gl2R - gl2L;
    var hbDX = -1, hbDY = slantRise / GLUE;   // вниз-влево — как у первого клапана
    var out = [];
    for (var hi = 1; hi <= HATCH_COUNT; hi++) {

      // 1) левый край клапана x = gl2L
      var tLeft = sx - gl2L; if (tLeft >= 0) tEnd = Math.min(tEnd, tLeft);

      //    y = (y2 - slantRise) + (slantRise/GLUE)*(x - gl2L)
      var kb = slantRise / GLUE, denomB = hbDY - kb * hbDX;
      if (Math.abs(denomB) > 1e-9) {

    function fl(i){ return (i === 0) ? secXs[i] : secXs[i] + SLOT_W/2; }
    function fr(i){ return (i === n-1) ? secXs[i+1] : secXs[i+1] - SLOT_W/2; }
    var i, xL, xR;
    for (i = 0; i < n; i++) {
      xL = fl(i); xR = fr(i);
      cut.push(L(xL, y0, xR, y0, 'cut'));
      cut.push(L(xL, y3, xR, y3, 'cut'));

    for (i = 0; i < n; i++) {

    // Собирает текст ошибки из того, чего не хватает (конструкция / профиль / размеры).

  function missingInputMessage() {
    var l = parseFloat(document.getElementById('bcL').value);

    var h = parseFloat(document.getElementById('bcH').value);
    var profile = document.getElementById('bcProfile').value;

    var noConstr  = !calcSel.value;
    var noProfile = !profile || profile === '-';
    var noSizes   = !l || !w || !h;

    // ничего не выбрано и не введено — общий текст
    if (noConstr && noProfile && noSizes) return 'Выберите конструкцию, профиль и введите размеры';

    var parts = [];          // «выберите …»

  function readBC() {

    cut.push(L(xL, y3, xR, y3, 'cut'));
  }
  // вертикальные резы флапов
  for (i = 0; i < panels.length; i++) {
    xL = flapLeft(i); xR = flapRight(i);
    cut.push(L(xL, y0, xL, y1, 'cut'));
    cut.push(L(xR, y0, xR, y1, 'cut'));
    cut.push(L(xL, y2, xL, y3, 'cut'));
    cut.push(L(xR, y2, xR, y3, 'cut'));
  }
  // ПРАВКА B: замыкаем ОБА боковых края тела вертикальным резом
  cut.push(L(xs[0],    y1, xs[0],    y2, 'cut'));   // левый край (было открыто)
  cut.push(L(xs[last], y1, xs[last], y2, 'cut'));   // правый край

      // ── ЦЕНТРЫ СЛОТОВ = стыки между сегментами (xs[1]..xs[last-1]) ──
  var slotCenters = [];
  for (i = 1; i < panels.length; i++) slotCenters.push(xs[i]);   // xs[1], xs[2], xs[3], xs[4]
  var HW = SLOT_W / 2;   // полуширина слота (4мм)

  // ── ВЕРТИКАЛЬНЫЕ БИГОВКИ (сгибы стенок) — на КАЖДОМ стыке (ничего не пропускаем) ──
  for (i = 1; i < panels.length; i++) {
    fold.push(L(xs[i], y1, xs[i], y2, 'fold'));
  }

  // ── ГОРИЗОНТАЛЬНЫЕ БИГОВКИ y1/y2 с РАЗРЫВАМИ в зонах слотов (биговка только КАСАЕТСЯ реза) ──
  function foldHWithGaps(yLine) {
    // собираем зоны-разрывы [c-HW, c+HW] по всем слотам, сортируем
    var gaps = slotCenters.map(function (c) { return [c - HW, c + HW]; })
                          .sort(function (a, b) { return a[0] - b[0]; });
    var cur = xStart;
    for (var g = 0; g < gaps.length; g++) {
      var g0 = gaps[g][0], g1 = gaps[g][1];
      if (g0 > cur) fold.push(L(cur, yLine, g0, yLine, 'fold'));   // сегмент биговки до слота (касается)
      cur = g1;                                                     // перепрыгиваем слот
    }
    if (cur < totalW) fold.push(L(cur, yLine, totalW, yLine, 'fold'));   // хвост
  }
  foldHWithGaps(y1);
  foldHWithGaps(y2);

  // ── ЗАМЫКАНИЕ СЛОТОВ горизонтальным РЕЗОМ (8 шт: по 2 на каждый стык) ──
  for (i = 0; i < slotCenters.length; i++) {
    var sc = slotCenters[i];
    cut.push(L(sc - HW, y1, sc + HW, y1, 'cut'));   // верхний слот замыкается снизу (на y1)
    cut.push(L(sc - HW, y2, sc + HW, y2, 'cut'));   // нижний слот замыкается сверху (на y2)
  }

  // ===== РАЗМЕРЫ (стиль/подложка 0422, цвет 0422) =====
  var dims = '';
  if (withDims) {
    var base = Math.max(totalW, totalH);
    var fs  = base * 0.016 * 1.65;
    var off = base * 0.05;
    var arr = off * 0.28;

    // ── подпись с белой подложкой по центру линии (из 0422) ──
    function dimLabel(cx, cy, txt, rot){
      var str = String(txt);
      var padX = fs*0.32, padY = fs*0.30;
      var bw = str.length * fs*0.58 + padX*2, bh = fs + padY*2;
      var g = '<g';
      if (rot === -90) g += ' transform="rotate(-90 '+cx+' '+cy+')"';
      g += '>';
      g += '<rect class="dimbg" x="'+(cx-bw/2)+'" y="'+(cy-bh/2)+'" width="'+bw+'" height="'+bh+'" rx="'+(fs*0.15)+'"/>';
      g += '<text class="dimtxt" style="font-size:'+fs+'px" x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central">'+str+'</text>';
      g += '</g>';
      return g;
    }
    function hDim(x1,x2,yLine,txt){
      var s=L(x1,yLine,x2,yLine,'dim');
      s+=arrowTri(x1,yLine,180,arr)+arrowTri(x2,yLine,0,arr);
      s+=dimLabel((x1+x2)/2, yLine, txt, 0);
      return s;
    }
    function vDim(x,ya,yb,txt){
      var s=L(x,ya,x,yb,'dim');
      s+=arrowTri(x,ya,-90,arr)+arrowTri(x,yb,90,arr);
      s+=dimLabel(x,(ya+yb)/2,txt,-90);
      return s;
    }

               // ── горизонтальные размеры секций (ПО ЦЕНТРУ тела, опущены на четверть ниже) ──
               var dimY = y1 + (y2 - y1) * 0.875;         // на четверть ниже центра тела
    for (i = 0; i < panels.length; i++) {
      dims += hDim(xs[i], xs[i+1], dimY, panels[i]);
    }
        // усики (выносные линии) габаритов — как в 0422
        var extGap = off * 1.05, extBack = off * 0.18;

// общая ширина — снизу, поднята ближе к чертежу
var totY = y3 + off * 1.3;
dims += hDim(xStart, totalW, totY, Math.round(totalW));
dims += L(xStart, totY + extBack, xStart, totY - extGap, 'dim');   // левый усик
dims += L(totalW, totY + extBack, totalW, totY - extGap, 'dim');   // правый усик

    // ── вертикальные размеры секций — ВНУТРИ, на панели 206 (4-я, xs[3]..xs[4]) ──
    // центр панели 206 + 10% её ширины вправо
    var pC   = (xs[3] + xs[4]) / 2;
    var dimX = pC + (xs[4] - xs[3]) * 0.325;   // 10% вправо от центра панели 206
    var yMarks = [
      { a: y0, b: y1, t: flapH },
      { a: y1, b: y2, t: wallH },
      { a: y2, b: y3, t: flapH }
    ];
    for (var k = 0; k < yMarks.length; k++) {
      dims += vDim(dimX, yMarks[k].a, yMarks[k].b, yMarks[k].t);
    }
        // общая высота — СПРАВА от чертежа, равноудалено (off*1.2, как горизонтальный)
        var totX = totalW + off * 1.3;
    dims += vDim(totX, y0, y3, Math.round(totalH));
    dims += L(totX + extBack, y0, totX - extGap, y0, 'dim');   // верхний усик
    dims += L(totX + extBack, y3, totX - extGap, y3, 'dim');   // нижний усик
  }

  // ── viewBox ──
  var vbX, vbY, vbW, vbH;
  if (withDims) {
    var pad = Math.max(totalW, totalH) * 0.10;
    var drawW = totalW + pad*2, drawH = totalH + pad*2, drawX = -pad, drawY = -pad;
    var boxAR = 1450 / 800;
    try {
      var pv = document.getElementById('preview');
      if (pv) {
        var cs = getComputedStyle(pv);
        var padXc = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
        var padYc = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
        var innerW = pv.clientWidth - padXc, innerH = pv.clientHeight - padYc;
        if (innerW > 0 && innerH > 0) boxAR = innerW / innerH;
      }
    } catch(e) {}
    var drawAR = drawW / drawH;
    if (drawAR < boxAR) { var newW = drawH * boxAR; drawX -= (newW - drawW)/2; drawW = newW; }
    else { var newH = drawW / boxAR; drawY -= (newH - drawH)/2; drawH = newH; }
    vbX = drawX; vbY = drawY; vbW = drawW; vbH = drawH;
  } else {
    vbX = 0; vbY = 0; vbW = totalW; vbH = totalH;
  }
  var vb = vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH;
  var sizeAttr = withDims ? '' : 'width="' + totalW + 'mm" height="' + totalH + 'mm"';
  var cls = withDims ? 'class="drawing"' : '';

  var boost = forPDF ? PDF_LINE_BOOST : 1.25;
  var cutSW = CUT_SW * boost, dimSW = DIM_SW * boost;
  var vecEff = forPDF ? '' : 'vector-effect:non-scaling-stroke;';

  var c04 = colors04();
  var dashArr04 = forPDF ? (4 * boost * 3) + ' ' + (2 * boost * 3) : (4 * 3) + ' ' + (2 * 3);
  var foldDash04 = c04.foldDash ? ('stroke-dasharray:' + dashArr04 + ';') : '';
  return '<svg xmlns="http://www.w3.org/2000/svg" ' + cls + ' viewBox="' + vb + '" ' + sizeAttr + ' preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" style="shape-rendering:geometricPrecision;">' +
    '<style>' +
    '.cut{stroke:' + c04.cut + ';stroke-width:' + cutSW + ';fill:none;' + vecEff + '}' +
    '.fold{stroke:' + c04.fold + ';stroke-width:' + cutSW + ';fill:none;' + foldDash04 + vecEff + '}' +
    '.dim{stroke:' + c04.dim + ';stroke-width:' + dimSW + ';stroke-linecap:round;' + vecEff + '}' +
    '.dimarr-tri{fill:' + c04.dim + ';stroke:none;}' +
    '.dimtxt{font-family:Arial,sans-serif;font-weight:bold;fill:' + c04.dim + ';}' +
    '.dimbg{fill:#FFFFFF;stroke:none;}' +
    '</style>' + cut.join('') + fold.join('') + dims + '</svg>';
}


// ====== ГЕНЕРАТОР 0410(копия 0409 + открытый последний сегмент) ======
// Отличие от 0409: у ПОСЛЕДНЕГО сегмента (5-я панель, h+2) удалены верхний и
// нижний клапаны. Две горизонтальные линии на y1/y2 в зоне этого сегмента
// становятся РЕЗОМ (cut) вместо биговки. build0409 НЕ ИЗМЕНЁН.
function build0410(l, w, h, profile, withDims, forPDF) {
  var GLUE = 0;
  var flapH = h + 2;
  var wallH = l + 3;
  var panels = [h + 2, w + 3, h + 3, w + 6, h + 2];
  var totalH = flapH * 2 + wallH;
  var y0 = 0, y1 = flapH, y2 = flapH + wallH, y3 = totalH;

  var xStart = 0;
  var xs = [xStart];
  for (var p = 0; p < panels.length; p++) xs.push(xs[xs.length - 1] + panels[p]);
  var last = panels.length;
  var totalW = xs[last];
  var lastSeg = last - 1;   // индекс последнего сегмента (5-я панель, h+2)

  var cut = [], fold = [];

  function flapLeft(i)  { return (i === 0) ? xs[i] : xs[i] + SLOT_W / 2; }
  function flapRight(i) {
    if (i === last - 1) return xs[i + 1];
    return xs[i + 1] - SLOT_W / 2;
  }

  var i, xL, xR;
  // горизонтальные резы флапов — ПРОПУСКАЕМ последний сегмент
  for (i = 0; i < panels.length; i++) {
    if (i === lastSeg) continue;
    xL = flapLeft(i); xR = flapRight(i);
    cut.push(L(xL, y0, xR, y0, 'cut'));
    cut.push(L(xL, y3, xR, y3, 'cut'));
  }
  // вертикальные резы флапов — ПРОПУСКАЕМ последний сегмент
  for (i = 0; i < panels.length; i++) {
    if (i === lastSeg) continue;
    xL = flapLeft(i); xR = flapRight(i);
    cut.push(L(xL, y0, xL, y1, 'cut'));
    cut.push(L(xR, y0, xR, y1, 'cut'));
    cut.push(L(xL, y2, xL, y3, 'cut'));
    cut.push(L(xR, y2, xR, y3, 'cut'));
  }
  // боковые края тела вертикальным резом (как в 0409)
  cut.push(L(xs[0],    y1, xs[0],    y2, 'cut'));
  cut.push(L(xs[last], y1, xs[last], y2, 'cut'));

  // ── ЦЕНТРЫ СЛОТОВ = стыки xs[1]..xs[last-1] ──
  var slotCenters = [];
  for (i = 1; i < panels.length; i++) slotCenters.push(xs[i]);
  var HW = SLOT_W / 2;

  // ── ВЕРТИКАЛЬНЫЕ БИГОВКИ на каждом стыке ──
  for (i = 1; i < panels.length; i++) {
    fold.push(L(xs[i], y1, xs[i], y2, 'fold'));
  }

  // ── ГОРИЗОНТАЛЬНЫЕ y1/y2: биговка с разрывами; ХВОСТ (последний сегмент) = РЕЗ ──
  function lineHWithGaps(yLine) {
    var gaps = slotCenters.map(function (c) { return [c - HW, c + HW]; })
                          .sort(function (a, b) { return a[0] - b[0]; });
    var cur = xStart;
    for (var g = 0; g < gaps.length; g++) {
      var g0 = gaps[g][0], g1 = gaps[g][1];
      if (g0 > cur) fold.push(L(cur, yLine, g0, yLine, 'fold'));   // биговка до слота
      cur = g1;
    }
    // хвост = зона последнего сегмента (клапаны удалены) → РЕЗ (cut)
    if (cur < totalW) cut.push(L(cur, yLine, totalW, yLine, 'cut'));
  }
  lineHWithGaps(y1);
  lineHWithGaps(y2);

  // ── ЗАМЫКАНИЕ СЛОТОВ горизонтальным РЕЗОМ (по 2 на стык) ──
  for (i = 0; i < slotCenters.length; i++) {
    var sc = slotCenters[i];
    cut.push(L(sc - HW, y1, sc + HW, y1, 'cut'));
    cut.push(L(sc - HW, y2, sc + HW, y2, 'cut'));
  }

  // ===== РАЗМЕРЫ (полностью как в 0409) =====
  var dims = '';
  if (withDims) {
    var base = Math.max(totalW, totalH);
    var fs  = base * 0.016 * 1.65;
    var off = base * 0.05;
    var arr = off * 0.28;

    function dimLabel(cx, cy, txt, rot){
      var str = String(txt);
      var padX = fs*0.32, padY = fs*0.30;
      var bw = str.length * fs*0.58 + padX*2, bh = fs + padY*2;
      var g = '<g';
      if (rot === -90) g += ' transform="rotate(-90 '+cx+' '+cy+')"';
      g += '>';
      g += '<rect class="dimbg" x="'+(cx-bw/2)+'" y="'+(cy-bh/2)+'" width="'+bw+'" height="'+bh+'" rx="'+(fs*0.15)+'"/>';
      g += '<text class="dimtxt" style="font-size:'+fs+'px" x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central">'+str+'</text>';
      g += '</g>';
      return g;
    }
    function hDim(x1,x2,yLine,txt){
      var s=L(x1,yLine,x2,yLine,'dim');
      s+=arrowTri(x1,yLine,180,arr)+arrowTri(x2,yLine,0,arr);
      s+=dimLabel((x1+x2)/2, yLine, txt, 0);
      return s;
    }
    function vDim(x,ya,yb,txt){
      var s=L(x,ya,x,yb,'dim');
      s+=arrowTri(x,ya,-90,arr)+arrowTri(x,yb,90,arr);
      s+=dimLabel(x,(ya+yb)/2,txt,-90);
      return s;
    }

    var dimY = y1 + (y2 - y1) * 0.875;
    for (i = 0; i < panels.length; i++) {
      dims += hDim(xs[i], xs[i+1], dimY, panels[i]);
    }
    var extGap = off * 1.05, extBack = off * 0.18;

    var totY = y3 + off * 1.3;
    dims += hDim(xStart, totalW, totY, Math.round(totalW));
    dims += L(xStart, totY + extBack, xStart, totY - extGap, 'dim');
    dims += L(totalW, totY + extBack, totalW, totY - extGap, 'dim');

    var pC   = (xs[3] + xs[4]) / 2;
    var dimX = pC + (xs[4] - xs[3]) * 0.325;
    var yMarks = [
      { a: y0, b: y1, t: flapH },
      { a: y1, b: y2, t: wallH },
      { a: y2, b: y3, t: flapH }
    ];
    for (var k = 0; k < yMarks.length; k++) {
      dims += vDim(dimX, yMarks[k].a, yMarks[k].b, yMarks[k].t);
    }
    var totX = totalW + off * 1.3;
    dims += vDim(totX, y0, y3, Math.round(totalH));
    dims += L(totX + extBack, y0, totX - extGap, y0, 'dim');
    dims += L(totX + extBack, y3, totX - extGap, y3, 'dim');
  }

  // ── viewBox (как в 0409) ──
  var vbX, vbY, vbW, vbH;
  if (withDims) {
    var pad = Math.max(totalW, totalH) * 0.10;
    var drawW = totalW + pad*2, drawH = totalH + pad*2, drawX = -pad, drawY = -pad;
    var boxAR = 1450 / 800;
    try {
      var pv = document.getElementById('preview');
      if (pv) {
        var cs = getComputedStyle(pv);
        var padXc = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
        var padYc = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
        var innerW = pv.clientWidth - padXc, innerH = pv.clientHeight - padYc;
        if (innerW > 0 && innerH > 0) boxAR = innerW / innerH;
      }
    } catch(e) {}
    var drawAR = drawW / drawH;
    if (drawAR < boxAR) { var newW = drawH * boxAR; drawX -= (newW - drawW)/2; drawW = newW; }
    else { var newH = drawW / boxAR; drawY -= (newH - drawH)/2; drawH = newH; }
    vbX = drawX; vbY = drawY; vbW = drawW; vbH = drawH;
  } else {
    vbX = 0; vbY = 0; vbW = totalW; vbH = totalH;
  }
  var vb = vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH;
  var sizeAttr = withDims ? '' : 'width="' + totalW + 'mm" height="' + totalH + 'mm"';
  var cls = withDims ? 'class="drawing"' : '';

  var boost = forPDF ? PDF_LINE_BOOST : 1.25;
  var cutSW = CUT_SW * boost, dimSW = DIM_SW * boost;
  var vecEff = forPDF ? '' : 'vector-effect:non-scaling-stroke;';

  var c04 = colors04();
  var dashArr04 = forPDF ? (4 * boost * 3) + ' ' + (2 * boost * 3) : (4 * 3) + ' ' + (2 * 3);
  var foldDash04 = c04.foldDash ? ('stroke-dasharray:' + dashArr04 + ';') : '';
  return '<svg xmlns="http://www.w3.org/2000/svg" ' + cls + ' viewBox="' + vb + '" ' + sizeAttr + ' preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" style="shape-rendering:geometricPrecision;">' +
    '<style>' +
    '.cut{stroke:' + c04.cut + ';stroke-width:' + cutSW + ';fill:none;' + vecEff + '}' +
    '.fold{stroke:' + c04.fold + ';stroke-width:' + cutSW + ';fill:none;' + foldDash04 + vecEff + '}' +
    '.dim{stroke:' + c04.dim + ';stroke-width:' + dimSW + ';stroke-linecap:round;' + vecEff + '}' +
    '.dimarr-tri{fill:' + c04.dim + ';stroke:none;}' +
    '.dimtxt{font-family:Arial,sans-serif;font-weight:bold;fill:' + c04.dim + ';}' +
    '.dimbg{fill:#FFFFFF;stroke:none;}' +
    '</style>' + cut.join('') + fold.join('') + dims + '</svg>';
}


                    // ====== ГЕНЕРАТОР 0427 (изолированный модуль) ======
  // Предельные размеры для 0427 (мм)
  var LIMITS_0427 = { L:[100,1300], W:[80,800], H:[25,300] };
  // Проверка габаритов. Возвращает текст ошибки или null, если всё ОК.
  function validate0427(l, w, h) {
    var errs = [];
    if (l < LIMITS_0427.L[0] || l > LIMITS_0427.L[1]) errs.push('Длина: ' + LIMITS_0427.L[0] + '–' + LIMITS_0427.L[1] + ' мм');
    if (w < LIMITS_0427.W[0] || w > LIMITS_0427.W[1]) errs.push('Ширина: ' + LIMITS_0427.W[0] + '–' + LIMITS_0427.W[1] + ' мм');
    if (h < LIMITS_0427.H[0] || h > LIMITS_0427.H[1]) errs.push('Высота: ' + LIMITS_0427.H[0] + '–' + LIMITS_0427.H[1] + ' мм');
    if (h > w) errs.push('Высота (' + h + ') не может быть больше ширины (' + w + ')');
    if (w > l) errs.push('Ширина (' + w + ') не может быть больше длины (' + l + ')');
    return errs.length ? ('Для 0427 недопустимые размеры:\n' + errs.join('\n')) : null;
  }

  // Кол-во замков: 50–100 → 1; 100–500 → 2
  function lockCount0427(w) { return (w <= 130) ? 1 : 2; }
    // Высота замка (= основание на линии реза) по ШИРИНЕ короба W, мм:
  // 80–130→30, 130–180→35, 180–250→40, 250–300→45, 300–350→50,
  // 350–400→55, 400–500→65, (500–600→65), 600–700→75, 700–800→100
  function lockHeight0427(w) {
    if (w <= 130) return 40;
    if (w <= 180) return 35;
    if (w <= 250) return 45;
    if (w <= 300) return 55;
    if (w <= 350) return 60;
    if (w <= 400) return 65;
    if (w <= 450) return 75;
    if (w <= 500) return 80;
    if (w <= 550) return 85;
    if (w <= 600) return 90;
    if (w <= 650) return 95;   // 400–500 и 500–600 → 65
    if (w <= 700) return 110;
    return 140;                // 700–800
  }

  function jointRadius0427(maxSize) {
  if (maxSize <= 75)  return 2;
  if (maxSize <= 200) return 3;
  if (maxSize <= 300) return 4;
  if (maxSize <= 400) return 8;
  return 12;
}

function build0427(l, w, h, profile, withDims, forPDF) {
  if (profile === 'E') l = l - 10;   // оффсет длины −10 только для E (ввод 150 → строим как 140)
  var c = [], f = [];

  var rnd = function(v){ return Math.round(v*100)/100; };

    var yInner = yBase + sign * FLAP_GREEN_TRIM;
    // РЕЖИМ 1 (р4 есть): yEar укорочен на trim со стороны тела (в сторону yFar).
    // РЕЖИМ 2 (р4 нет):  trim=0 → вертикаль доходит до перегиба (до конца).
    var FVT = HAS ? (PP.FLAPV_TRIM || 0) : 0;   // укорочение вертикали уголка со стороны короба (мм)
    var yEarL = yInner - exY + sign * (EAR_TRIM_L + FVT);   // левая вертикаль — свой режим
    var yEarR = yInner - exY + sign * (EAR_TRIM_R + FVT);   // правая вертикаль — свой режим
    // ЛЕВЫЙ уголок
    c.push(L(xL, yFar, xOutL, yFar, 'flapcorner'));
    c.push(L(xOutL, yFar, xOutL, yEarL, 'flapcornerv'));
    // ПРАВЫЙ уголок
    c.push(L(xR, yFar, xOutR, yFar, 'flapcorner'));
    c.push(L(xOutR, yFar, xOutR, yEarR, 'flapcornerv'));
  }

  // ============================================================
  // КЛАПАН:
  //   Зелёные горизонт. биговки сдвинуты навстречу по 3мм по Y.
  //   Диагональ 3×6: конец на зелёной (xL/xR,yGreen) → синяя биговка тела (XbL/XbR,yNear).
  //   Боковые линии клапана xL(yGreen)→xL(yFar) — РЕЗ (формируют клапан) + биговка.
  //   Уголки — СИНИЕ (класс flapcorner), вынесены в buildFlapCorners.
  // ============================================================
  function buildFlap(yBase, sign){
    var IN = HAS ? PP.IN : 0;
    var TAG = (sign < 0) ? ' data-flaptop="1"' : '';   // верхний клапан помечаем
    var GY = FLAP_DIAG_Y;   // ⚙️ сдвиг зелёной по Y = высота диагонали (2×6)
    var xL = XbL + IN, xR = XbR - IN;
    var s1L = XbL - side1, s1R = XbR + side1;

    // ── ДЛИНА КЛАПАНА ПО X = W/2 от складки (xL/xR), но не за крайнюю точку реза (замок) ──
    var s2L_lim = (XbL - side1) - LEDGE - side2;   // крайняя грань замка слева
    var s2R_lim = (XbR + side1) + LEDGE + side2;   // крайняя грань замка справа
    var xLimitL = s2L_lim - KEY_OUT;               // самая левая точка реза
    var xLimitR = s2R_lim + KEY_OUT;               // самая правая точка реза
    var xOutL = Math.max(xL - w / 2, xLimitL);     // клапан влево на W/2, но не за лимит
    var xOutR = Math.min(xR + w / 2, xLimitR);     // клапан вправо на W/2, но не за лимит

    var yFar  = yBase + sign * yBot + ((sign < 0) ? topFlapDrop : 0);   // верхний клапан: дальний край опущен на topFlapDrop
    var yNear = yBase;                    // линия стыка с телом
    var yGreen = yNear - sign * GY;       // ЗЕЛЁНАЯ сдвинута навстречу

    // ЗЕЛЁНАЯ биговка (yGreen), между xL..xR
    c.push('<path class="foldgreen" d="' + M(xL, yGreen) + Ln(xR, yGreen) + '"/>');

    // ДИАГОНАЛИ (РЕЗ): зелёная (xL/xR,yGreen) → синяя биговка тела (XbL/XbR,yNear)
    c.push(L(XbL, yNear, xL, yGreen, 'cut'));
    c.push(L(XbR, yNear, xR, yGreen, 'cut'));

        // ── ГОРИЗОНТАЛЬНАЯ ЛИНИЯ РЕЗА на ЛИНИИ СТЫКА (yNear) — как на нижнем клапане:
    //    от биговки полки 10мм (s1L/s1R) до синей вертик. биговки тела (XbL/XbR).
    //    (одинаково сверху и снизу; НЕ на yGreen, чтобы верхняя не уезжала на 3мм)
       // рисуем линию реза перегиба ТОЛЬКО для ВЕРХНЕГО клапана (sign<0).
    // для нижнего (sign>0) её уже строит блок ТЕЛА на Y4 — иначе двойной рез.
    if (sign < 0) {
  var FCT = HAS ? PP.FLAP_CUT_TRIM : 0;
  c.push(L(s1L + FCT, yNear, XbL, yNear, 'cut'));   // верхняя левая
  c.push(L(s1R - FCT, yNear, XbR, yNear, 'cut'));   // верхняя правая
}

    // ВЕРТИКАЛЬНЫЕ БИГОВКИ клапана (складка): от зелёной до дальнего края.
    // (РЕЗ на этих X убран — вертикальных резов тут быть не должно)
    f.push(L(xL, yGreen, xL, yFar, 'fold'));
    f.push(L(xR, yGreen, xR, yFar, 'fold'));

               // УГОЛКИ: наружные края клапана = xOutL/xOutR (W/2 с ограничением по замку)
               buildFlapCorners(xL, xR, xOutL, xOutR, yFar, yBase, sign);

        // дальний рез между вершинами (внешний контур клапана).
    // Верхний клапан в режиме 0427 (topFlapDrop>0): середина не режется (там стык с верхом),
    // но добиваем КОРОТКИЕ резы от xL/xR до нижних точек дуг р4 — замыкаем контур.
    if (sign < 0 && topFlapDrop > 0) {
  // E: паразитные 2мм-огрызки (118→120 и 280→282) не рисуем.
  // ARC_X > IN только когда PP.IN+2 > PP.IN, т.е. всегда при HAS → добивка была лишней.
  var ARC_X = HAS ? (PP.IN + 2) : 0;
  var _DROP_TRIM = HAS ? (PP.TOPFLAP_CUT_TRIM || 0) : 0;   // E:4, B:нет
  if (ARC_X > IN && _DROP_TRIM === 0) {
    c.push(L(xL, yFar, XbL + ARC_X, yFar, 'cut'));
    c.push(L(XbR - ARC_X, yFar, xR, yFar, 'cut'));
  }
} else {
      c.push(L(xL, yFar, xR, yFar, 'cut'));
    }
  }

  buildFlap(Y4, +1);                    // нижний клапан
  if (!skipTopFlap) buildFlap(Y3, -1);  // верхний клапан (в гибриде пропускаем)
    // ── РАЗМЕРЫ 0422 (родные, тело+клапаны) ──
    var dims = '';
  if (withDims) {
    var base = Math.max(totalW, totalH), fs = base*0.016*1.65, off = base*0.05, arr = off*0.28;
    function dimLabel(cx,cy,txt,rot){
      var str=String(txt), padX=fs*0.32, padY=fs*0.30;
      var bw=str.length*fs*0.58+padX*2, bh=fs+padY*2, g='<g';
      if(rot===-90)g+=' transform="rotate(-90 '+cx+' '+cy+')"'; g+='>';
      g+='<rect class="dimbg" x="'+(cx-bw/2)+'" y="'+(cy-bh/2)+'" width="'+bw+'" height="'+bh+'" rx="'+(fs*0.15)+'"/>';
      g+='<text class="dimtxt" style="font-size:'+fs+'px" x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central">'+str+'</text></g>';
      return g;
    }
    function hDimIn(x1,x2,y,t){ return L(x1,y,x2,y,'dim')+arrowTri(x1+originX,y+originY,180,arr)+arrowTri(x2+originX,y+originY,0,arr)+dimLabel((x1+x2)/2+originX,y+originY,t,0); }
    function vDimIn(x,y1,y2,t){ return L(x,y1,x,y2,'dim')+arrowTri(x+originX,y1+originY,-90,arr)+arrowTri(x+originX,y2+originY,90,arr)+dimLabel(x+originX,(y1+y2)/2+originY,t,-90); }

    var dxIn = (XbL + XbR)/2 + (XbR - XbL) * 0.35;
    var FDY = HAS ? PP.FLAP_DIAG_Y : 0;
    // ярусы тела 0422: верхний клапан, тело, нижний клапан
    dims += vDimIn(dxIn, Ytop, Y3, Math.round(h + FDY));            // верхний клапан = h+2
    dims += vDimIn(dxIn, Y3,   Y4, Math.round(yHgt - 2*FDY));       // тело = w+3
    dims += vDimIn(dxIn, Y4,   Y5, Math.round(h + FDY));            // нижний клапан = h+2
    // длина по телу
    var BODY_DIM_FIX = HAS ? PP.BODY_DIM_FIX : 0;
    dims += hDimIn(XbL, XbR, Y3 + off*0.65, Math.round(body) - BODY_DIM_FIX);
    // габариты
    var extGap = off*1.05, extBack = off*0.18;
    var dxTot = totalW + off*1.2;
    dims += vDimIn(dxTot, 0, totalH, Math.round(totalH));
    dims += L(dxTot+extBack, 0,      dxTot-extGap, 0,      'dim');
    dims += L(dxTot+extBack, totalH, dxTot-extGap, totalH, 'dim');
    var dyTot = totalH + off*1.2;
    dims += hDimIn(0, totalW, dyTot, Math.round(totalW));
    dims += L(0,      dyTot+extBack, 0,      dyTot-extGap, 'dim');
    dims += L(totalW, dyTot+extBack, totalW, dyTot-extGap, 'dim');
  }

  // ── viewBox / SVG ──
  var vbX,vbY,vbW,vbH;
  if (withDims) {
    var pad = Math.max(totalW,totalH)*0.10;
    var drawW=totalW+pad*2, drawH=totalH+pad*2, drawX=-pad, drawY=-pad;
    var boxAR = 1450/800;
    try { var pv=document.getElementById('preview'); if(pv){var cs=getComputedStyle(pv);
      var pX=parseFloat(cs.paddingLeft)+parseFloat(cs.paddingRight), pY=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom);
      var iW=pv.clientWidth-pX, iH=pv.clientHeight-pY; if(iW>0&&iH>0)boxAR=iW/iH; } } catch(e){}
    var drawAR=drawW/drawH;
    if(drawAR<boxAR){var nW=drawH*boxAR;drawX-=(nW-drawW)/2;drawW=nW;}else{var nH=drawW/boxAR;drawY-=(nH-drawH)/2;drawH=nH;}
    vbX=drawX;vbY=drawY;vbW=drawW;vbH=drawH;
  } else { vbX=0;vbY=0;vbW=totalW;vbH=totalH; }
  var vb=vbX+' '+vbY+' '+vbW+' '+vbH;
  var sizeAttr=withDims?'':'width="'+totalW+'mm" height="'+totalH+'mm"';
  var cls=withDims?'class="drawing"':'';
  var boost=forPDF?PDF_LINE_BOOST:1.25;
  var cutSW=CUT_SW*boost, dimSW=DIM_SW*boost;
  var dashArr=forPDF?(4*boost*3)+' '+(2*boost*3):(4*3)+' '+(2*3);
  var vecEff=forPDF?'':'vector-effect:non-scaling-stroke;';
  var c04=colors04();
  var foldDash04=c04.foldDash?('stroke-dasharray:'+dashArr+';'):'';
  if (collect) {
    collect.c = c;
    collect.f = f;
    collect.meta = {
      XbL: XbL + originX, XbR: XbR + originX, body: body,
      Y3: Y3 + originY, Y4: Y4 + originY, Y5: Y5 + originY,
      totalW: totalW, totalH: totalH
    };
  }
  return '<svg xmlns="http://www.w3.org/2000/svg" '+cls+' viewBox="'+vb+'" '+sizeAttr+' preserveAspectRatio="xMidYMid meet">'+
    '<style>'+
    '.cut{stroke:'+c04.cut+';stroke-width:'+cutSW+';fill:none;'+vecEff+'}'+
    '.fold{stroke:'+c04.fold+';stroke-width:'+cutSW+';fill:none;'+foldDash04+vecEff+'}'+
    '.foldgreen{stroke:'+c04.fold+';stroke-width:'+cutSW+';fill:none;'+foldDash04+vecEff+'}'+
    '.flapcorner{stroke:'+c04.cut+';stroke-width:'+cutSW+';fill:none;'+vecEff+'}'+
    '.flapcornerv{stroke:'+c04.cut+';stroke-width:'+cutSW+';fill:none;'+vecEff+'}'+
    '.dim{stroke:'+c04.dim+';stroke-width:'+dimSW+';stroke-linecap:round;'+vecEff+'}'+
    '.dimarr-tri{fill:'+c04.dim+';stroke:none;}'+
    '.dimtxt{font-family:Arial,sans-serif;font-weight:bold;fill:'+c04.dim+';}'+
    '.dimbg{fill:#FFFFFF;stroke:none;}'+
    '</style>'+c.join('')+f.join('')+dims+'</svg>';
}



function previewBox() {
    if (!ensureReadyToDraw()) return;
    var v = readBC(); if (!v) return;
    var svg = buildDrawing(calcSel.value, v, true, false);
    if (!svg) return;
    document.getElementById('preview').innerHTML = svg;
    // показать кнопку цвета линий (появляется после первого удачного предпросмотра)
    var csBtn = document.getElementById('btnColorSwap');
    if (csBtn) { csBtn.style.display = ''; if (window._syncColorBtn) window._syncColorBtn(); }
    // «Предпросмотр» = момент появления расчётов (если тогл «Включить расчеты» включён)
    var _calcToggle = document.getElementById('toggleCalcOn');
    if (_calcToggle && _calcToggle.checked) CALC_SHOWN = true;
    calcDevelopment();   /* считаем при предпросмотре */
  }

  

  function generateBox() {
    if (!ensureReadyToDraw()) return;
    var v = readBC(); if (!v) return;
    var svg = buildDrawing(calcSel.value, v, false, false);
    if (!svg) return;
    var blob = new Blob([svg], { type: "image/svg+xml" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = companyPrefix() + calcSel.value + '_(' + v.l + 'х' + v.w + 'х' + v.h + ')' + v.profile + '.svg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById('btnDownload').addEventListener('click', generateBox);
  document.getElementById('btnPreview').addEventListener('click', previewBox);
  document.getElementById('btnClear').addEventListener('click', function () {
    document.getElementById('preview').innerHTML = '';   // стираем только чертёж
    var csBtn = document.getElementById('btnColorSwap');
    if (csBtn) csBtn.style.display = 'none';   // прячем кнопку цвета — чертежа больше нет
    CALC_SHOWN = false;                        // расчёты снова появятся только после Предпросмотра
    renderResults(null);                       // спрятать блок расчётов
  });
  function generatePDF() {
    if (!ensureReadyToDraw()) return;
    var v = readBC(); if (!v) return;

               // SVG чертежа с УСИЛЕННЫМИ линиями для PDF
               var svgString = buildDrawing(calcSel.value, v, true, true);
    if (!svgString) return;

    var tmp = document.createElement('div');
    tmp.innerHTML = svgString;
    var svgEl = tmp.querySelector('svg');
    var vb = svgEl.getAttribute('viewBox').split(/\s+/).map(parseFloat);
    var drawW = vb[2], drawH = vb[3];

        // Ограничиваем МАКСИМАЛЬНУЮ сторону растра (а не слепой ×4).
    // Для A4 300 dpi достаточно ~3500 px по длинной стороне.
    var MAX_SIDE = 3500;
    var RASTER = Math.min(4, MAX_SIDE / Math.max(drawW, drawH));
    if (RASTER < 1) RASTER = 1;
    var pxW = Math.round(drawW * RASTER);
    var pxH = Math.round(drawH * RASTER);
    svgEl.setAttribute('width', pxW);
    svgEl.setAttribute('height', pxH);
    var fixedSvg = new XMLSerializer().serializeToString(svgEl);

    var svgBlob = new Blob([fixedSvg], { type: 'image/svg+xml;charset=utf-8' });
    var svgUrl = URL.createObjectURL(svgBlob);

    // 1) грузим чертёж
    var drawImg = new Image();
    drawImg.onload = function () {
      var canvas = document.createElement('canvas');
      canvas.width = pxW; canvas.height = pxH;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, pxW, pxH);
      ctx.drawImage(drawImg, 0, 0, pxW, pxH);
      URL.revokeObjectURL(svgUrl);
            // JPEG вместо PNG: чертёж на белом фоне сжимается в СОТНИ раз лучше.
            var drawData = canvas.toDataURL('image/jpeg', 0.92);

            // нижняя картинка удалена — PDF только с чертежом
            placeIntoPDF(drawData, drawW, drawH, null);
    };
    drawImg.onerror = function () {
      URL.revokeObjectURL(svgUrl);
      alert('Не удалось отрисовать чертёж для PDF.');
    };
    drawImg.src = svgUrl;

    function placeIntoPDF(drawData, dW, dH, bottomImage) {
      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      var pageW = pdf.internal.pageSize.getWidth();
      var pageH = pdf.internal.pageSize.getHeight();
      var pad = 12;
      var availW = pageW - pad * 2;
      var availH = pageH - pad * 2;
      var gap = 6; // зазор между чертежом и картинкой (мм)

      // пропорции нижней картинки
      var bImgAspect = bottomImage ? (bottomImage.naturalWidth / bottomImage.naturalHeight) : 0;

      // Подбираем масштаб так, чтобы ОБА блока влезли по высоте и ширине.
      // Нижнюю картинку рисуем долей ширины чертежа (как в предпросмотре — поменьше).
      var BOTTOM_REL_W = 0.42; // ширина картинки относительно ширины чертежа

      // Высота всей композиции при ширине = W:
      //   чертёж: W * (dH/dW)
      //   картинка: (W*BOTTOM_REL_W) / bImgAspect
      function totalHeightAtWidth(W) {
        var h = W * (dH / dW);
        if (bottomImage) h += gap + (W * BOTTOM_REL_W) / bImgAspect;
        return h;
      }

      // Ищем максимальную ширину W <= availW, при которой высота <= availH
      var W = availW;
      if (totalHeightAtWidth(W) > availH) {
        // подгоняем по высоте бинарным поиском
        var lo = 0, hi = availW;
        for (var it = 0; it < 40; it++) {
          var midW = (lo + hi) / 2;
          if (totalHeightAtWidth(midW) <= availH) lo = midW; else hi = midW;
        }
        W = lo;
      }

      var drawOutW = W;
      var drawOutH = W * (dH / dW);
      var botOutW = bottomImage ? W * BOTTOM_REL_W : 0;
      var botOutH = bottomImage ? botOutW / bImgAspect : 0;

      var totalH = drawOutH + (bottomImage ? gap + botOutH : 0);

      // Центрируем весь блок на листе
      var offY = (pageH - totalH) / 2;
      var drawX = (pageW - drawOutW) / 2;
      var drawY = offY;

      pdf.addImage(drawData, 'JPEG', drawX, drawY, drawOutW, drawOutH);

      if (bottomImage) {
        var botX = (pageW - botOutW) / 2;
        var botY = drawY + drawOutH + gap;
        try {
          // переводим картинку в dataURL через canvas (на случай PNG с прозрачностью — кладём белый фон)
          var bc = document.createElement('canvas');
          bc.width = bottomImage.naturalWidth;
          bc.height = bottomImage.naturalHeight;
          var bctx = bc.getContext('2d');
          bctx.fillStyle = '#ffffff';
          bctx.fillRect(0, 0, bc.width, bc.height);
          bctx.drawImage(bottomImage, 0, 0);
          var botData = bc.toDataURL('image/png');
          pdf.addImage(botData, 'PNG', botX, botY, botOutW, botOutH);
        } catch (e) {
          // если картинка с другого домена и canvas «загрязнён» — пропускаем её
        }
      }

      pdf.save(companyPrefix() + calcSel.value + '_(' + v.l + 'х' + v.w + 'х' + v.h + ')' + v.profile + '.pdf');
    }
  }

  document.getElementById('btnPDF').addEventListener('click', generatePDF);

// ── КНОПКА ПЕРЕКЛЮЧЕНИЯ ЦВЕТА ЛИНИЙ (в углу поля чертежа) ──
var calcSel = document.getElementById('bcConstruction');   // ← объявляем ЗАРАНЕЕ (нужно для syncBtn)
(function () {
  var btn = document.getElementById('btnColorSwap');
  if (!btn) return;

  function group(c) {
    if (c === '0200' || c === '0201' || c === '0203') return '02';
    if (c === '0409' || c === '0410' || c === '0422' || c === '0427') return '04';
    return null;
  }

  var ON  = 'rgba(136,132,68,0.9)';
  var OFF = 'rgba(85,90,102,0.85)';

  // Синхронизирует подсветку/доступность кнопки под ФЛАГ текущей группы.
  // Цвет привязан строго к варианту конструкции (02ХХ или 04ХХ).
  function syncBtn() {
    var g = group(calcSel.value);
    if (g === '02') {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.background = COLOR_SWAP_02 ? ON : OFF;
    } else if (g === '04') {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.background = COLOR_SWAP_04 ? ON : OFF;
    } else {
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.background = OFF;
    }
  }
  // делаем доступной снаружи, чтобы дёргать при смене конструкции
  window._syncColorBtn = syncBtn;

  btn.addEventListener('click', function () {
    var g = group(calcSel.value);
    if (g === '02') {
      COLOR_SWAP_02 = !COLOR_SWAP_02;
    } else if (g === '04') {
      COLOR_SWAP_04 = !COLOR_SWAP_04;
    } else {
      return;
    }
    syncBtn();
    if (document.getElementById('preview').querySelector('svg')) {
      previewBox();
    }
  });

  syncBtn();  // стартовое состояние
})();

// ============================================================
// ЛИСТ СОГЛАСОВАНИЯ: бланк agreementform.png (альбомный A4) + чертёж с размерами.
// Чертёж: центр по X, центр по Y на 5% выше центра бланка.

var AGREE_ZONE_W = 0.713 * 1.125;   // ширина зоны чертежа (×1.5)
var AGREE_ZONE_H = 0.633 * 1.125;   // высота зоны чертежа (×1.5)
var AGREE_CY     = 0.45;   // центр чертежа по Y: 50% − 5% = 45%

function generateAgreementPDF() {
  if (PASTED_MODE && PASTED_IMG_DATA) { generateAgreementPDFPasted(); return; }
  if (!ensureReadyToDraw()) return;
  var v = readBC(); if (!v) return;
  var svgString = buildDrawing(calcSel.value, v, true, true);   // С РАЗМЕРАМИ, линии для PDF
  if (!svgString) return;

  var blank = new Image();
  blank.onload = function () {
    var bw = blank.naturalWidth, bh = blank.naturalHeight;

    var canvas = document.createElement('canvas');
    canvas.width = bw; canvas.height = bh;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, bw, bh);
    ctx.drawImage(blank, 0, 0);   // бланк = подложка

    // размеры чертежа из viewBox
    var tmp = document.createElement('div');
    tmp.innerHTML = svgString;
    var svgEl = tmp.querySelector('svg');
    var vb = svgEl.getAttribute('viewBox').split(/\s+/).map(parseFloat);
    var dW = vb[2], dH = vb[3];

    // вписываем в зону
    var scale = Math.min(bw * AGREE_ZONE_W / dW, bh * AGREE_ZONE_H / dH);
    var outW = Math.round(dW * scale), outH = Math.round(dH * scale);

    // растеризуем SVG в 2x для чёткости, кладём с даунскейлом
    svgEl.setAttribute('width', outW * 2);
    svgEl.setAttribute('height', outH * 2);
    var fixedSvg = new XMLSerializer().serializeToString(svgEl);
    var url = URL.createObjectURL(new Blob([fixedSvg], { type: 'image/svg+xml;charset=utf-8' }));
    var img = new Image();
    img.onload = function () {
      URL.revokeObjectURL(url);
      var x = (bw - outW) / 2;              // центр по X
      var y = bh * AGREE_CY - outH / 2;     // центр по Y на 45% высоты
      ctx.drawImage(img, x, y, outW, outH);

            // ── ЗАПОЛНЕНИЕ ТАБЛИЦЫ БЛАНКА (подпись + значение, шрифт TT Hoves) ──
            (function () {
        var fs = Math.round(bh * 0.016);            // размер шрифта под высоту строки
        ctx.fillStyle = '#000';
        ctx.font = fs + "px 'TT Hoves', Arial, sans-serif";
        ctx.textBaseline = 'alphabetic';
        function put(txt, xFrac, yFrac) {
          if (txt == null || txt === '') return;
          ctx.fillText(String(txt), bw * xFrac, bh * yFrac);
        }
            var tClient = (document.getElementById('bcCompany').value || '').trim();
        var tInner  = v.l + 'х' + v.w + 'х' + v.h;
        // Размеры заготовки: ВСЕГДА из расчёта чертежа (calcDevelopment → resL/resW).
        // Тогл «Заготовка на штамп» → +20 к ширине и длине. Формат записи: ШхД.
        calcDevelopment();   // освежаем resL/resW под текущие поля (иначе могут быть протухшими)
        var zW = parseFloat(document.getElementById('resW').value);   // ширина заготовки
        var zL = parseFloat(document.getElementById('resL').value);   // длина заготовки
        var stampEl = document.getElementById('toggleStamp');
        if (stampEl && stampEl.checked && isFinite(zW) && isFinite(zL)) { zW += 20; zL += 20; }
        var tBlank = (isFinite(zW) && isFinite(zL)) ? (zW + 'х' + zL) : '';
        // Наименование изделия: если пусто → внутренний размер "ДхШхВ"
        var tName = (document.getElementById('bcProdName').value || '').trim() || tInner;
                // Карта изделия (6 цифр) → на лист как введено, дополнено нулями слева до 6 цифр
                var card = (document.getElementById('bcCardNum').value || '').replace(/\D+/g, '');
        var tArt = card ? card.padStart(6, '0') : '';
        // Картон = Марка(вплотную)Профиль + пробел + Композиция → "Т-23бурB ЦЦЦ"
        var mk  = document.getElementById('bcMark').value;        if (!mk  || mk  === '-') mk  = '';
        var pf  = v.profile || '';                                if (pf === '-') pf = '';
        var cmp = document.getElementById('bcComposition').value; if (!cmp || cmp === '-') cmp = '';
        var tKarton = (mk + pf + (cmp ? ' ' + cmp : '')).trim();
        var tConstr = calcSel.value;
        // ── сетка таблицы (доли листа): 4 строки, лев. колонка / прав. колонка ──
        var XL  = 0.393;    // левая колонка (все строки)
        var XR1 = 0.740;    // правая колонка 1-й строки (Картон)
        var XR  = 0.645;    // правая колонка строк 2–4
        var TBL_SHIFT_Y = 0.010;   // ⚙️ СДВИГ ВСЕХ СТРОК: + вниз, − вверх (0.01 ≈ 8мм)
        var Y1 = 0.840 + TBL_SHIFT_Y,
            Y2 = 0.862 + TBL_SHIFT_Y,
            Y3 = 0.884 + TBL_SHIFT_Y,
            Y4 = 0.9055 + TBL_SHIFT_Y;   // базовые линии строк
        // строка 1: Клиент | Картон
        put('Клиент:' + (tClient ? ' ' + tClient : ''), XL,  Y1);
        put('Картон:' + (tKarton ? ' ' + tKarton : ''), XR1, Y1);
                // строка 2: Наименование | Артикул
                put('Наименование изделия: ' + tName, XL, Y2);
        put('Артикул поставщика КИ:' + (tArt ? ' ' + tArt : ''), XR, Y2);
        // строка 3: Внутренние размеры | Конструкция
        put('Внутренние размеры, мм: ' + tInner, XL, Y3);
        put('Конструкция изделия: FEFCO ' + tConstr, XR, Y3);
        // строка 4: Размеры заготовки | Печать
        put('Размеры заготовки, мм: ' + tBlank, XL, Y4);
        put('Печать:',                          XR, Y4);
      })();

      var data;
      try {
        data = canvas.toDataURL('image/jpeg', 0.9);
      } catch (e) {
        console.error(e);
        showError('Браузер заблокировал бланк (file:// + canvas).\nВставь бланк в base64 → AGREE_BLANK_B64.');
        return;
      }
      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      pdf.addImage(data, 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
           // имя файла БЕЗ "_": запрещённые для файла символы и подчёркивания удаляем
           var client = (document.getElementById('bcCompany').value || '').trim()
                     .replace(/[\\/:*?"<>|_]+/g, '').replace(/\s+/g, ' ').trim();
      pdf.save('Согласование ' + (client ? client + ' ' : '') + calcSel.value +
               ' (' + v.l + 'х' + v.w + 'х' + v.h + ')' + v.profile + '.pdf');};
    img.onerror = function () {
      URL.revokeObjectURL(url);
      showError('Не удалось отрисовать чертёж для листа согласования.');
    };
    img.src = url;
  };
  blank.onerror = function () {
    showError('Не найден бланк agreementform.png рядом с index.html');
  };
  blank.src = AGREE_BLANK_B64
    ? ('data:image/png;base64,' + AGREE_BLANK_B64)
    : 'agreementform.png';
}
