<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <title>SABOS calc</title>
    <link rel="icon" type="image/jpeg" href="sabos_logo.jpg">
    <link rel="shortcut icon" type="image/jpeg" href="sabos_logo.jpg">
    <link rel="apple-touch-icon" href="sabos_logo.jpg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @font-face {
    font-family: 'TT Hoves';
    src: url('TTHoves-Regular.woff2') format('woff2'),
         url('TTHoves-Regular.woff') format('woff'),
         url('TTHoves-Regular.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  :root {
  --field-w: 135px; --label-w: 70px; --gap: 30px;
  --header-h: 65px;        /* шапка +30% */
  --left-w: 150px;         /* левая полоса -15% */
  --logo-scale: 2.5;       /* увеличение логотипа */
  --logo-x: 0px;           /* сдвиг логотипа по горизонтали */
  --logo-y: 0px;           /* сдвиг логотипа по вертикали */
  --preview-offset-x: 65px;
  --preview-offset-y: 50px;
  --img-offset-x: -150px;
  --img-offset-y: -65px;
  --img-width: 500px;
  --preview-w: 1450px;       /* ширина поля чертежа */
  --preview-shift-x: 38px;    /* сдвиг поля чертежа вправо (на layout.png) */

    /* ── ТЕМА (по умолчанию — светлая) ── */
    --theme-right-bg: #6E798A;   /* правый фон */
  --theme-main-bg:  #fff;      /* основное поле */
  --theme-field-bg: #fff;      /* фон полей ввода */
  --theme-text:     #000;      /* цвет текста */
  --theme-toggle-off: #ccc;    /* выкл. тогл */
  --theme-toggle-on:  #A69C87; /* вкл. тогл */
}

/* Тёмная тема */
body[data-theme="dark"] {
  --theme-right-bg: #45484D;
  --theme-main-bg:  #6E798A;
  --theme-field-bg: #5E6875;   /* на 15% темнее основного фона */
  --theme-text:     #fff;      /* белый шрифт */
  --theme-toggle-off: #5E6875; /* выкл. = темнее фона */
  --theme-toggle-on:  #703D30; /* вкл. */
}
/* Тема для глаз */
body[data-theme="eye"] {
  --theme-right-bg: #6E798A;
  --theme-main-bg:  #A69C87;
  --theme-field-bg: #8D8573;   /* на 15% темнее основного фона */
  --theme-text:     #000;
  --theme-toggle-off: #8D8573;
  --theme-toggle-on:  #703D30; /* вкл. */
}
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'TT Hoves', sans-serif;
    background: #6E798A;
    zoom: 0.835;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  
  /* ===== ШАПКА ===== */
  .site-header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    background: #232B38; z-index: 1000;
    display: flex; align-items: center;
    padding: 0 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .site-header img.logo-img {
  height: calc(var(--header-h) * 0.5 * var(--logo-scale));
  width: auto; display: block;
  transform: translate(var(--logo-x), var(--logo-y));
  transform-origin: left center;
}
  /* ── ПЕРЕКЛЮЧАТЕЛЬ ТЕМ (правый угол шапки) ── */
    .theme-switch {
    margin-left: auto;          /* прижать вправо */
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .theme-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35);
    cursor: pointer;
    padding: 0;
    line-height: 0;
    transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
  }
  .theme-btn:hover { transform: scale(1.08); border-color: rgba(255,255,255,0.7); }
  .theme-btn.active {
    border-color: #fff;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.35);
  }
  .theme-btn[data-set="light"] { background: #ffffff; }
  .theme-btn[data-set="dark"]  { background: #45484D; }
  .theme-btn[data-set="eye"]   { background: #A69C87; }
  /* ===== ОБЩИЙ КАРКАС ФОНА ===== */
  .page {
    display: flex;
    height: 1342px;            /* фиксированная высота страницы */
    min-height: 1342px;
    padding-top: var(--header-h);
    width: 100%;
    overflow-x: hidden;
  }
  .center-bg {
    flex: 1 1 auto;
    background: var(--theme-main-bg);
    min-width: 0;
    overflow: visible;
    position: relative;
    z-index: 10;
  }
  .right-bg {
    flex: 0 0 310px;
    width: 240px;
    align-self: stretch;          /* тянется на всю высоту страницы */
    position: relative;
    background: var(--theme-right-bg);  /* фон зависит от темы */
    z-index: 2;
  }
  .right-bg .box-shape {
    display: block;
    height: 100%;                 /* масштаб по высоте страницы (1342px) */
    width: auto;                  /* ширина пропорционально → 778×(высота/4026) */
    object-fit: contain;          /* без искажений и без обрезки */
  }
  
  /* ===== КОНТЕНТ ===== */
  .container {
    background: transparent;
    padding: 5px 30px 30px 30px;
    position: relative;
    color: #000;
  }
  .columns {
    padding-top: 0;
  }
  h2 {
    margin: 0 0 10px 0;     /* доп. отступ снизу = увеличенный зазор до FEFCO */
    padding: 0;
    color: #333;
    font-size: 31px;
    font-weight: normal;
    text-indent: 0;
    text-align: left;
  }
  
  .input-group { margin: 0; display: flex; gap: var(--gap); align-items: center; justify-content: space-between; }
  label { width: var(--label-w); font-size: 24px; }
  input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: var(--field-w); box-sizing: border-box; height: 38px; font-size: 20px; font-weight: normal; font-family: 'TT Hoves', sans-serif; background: var(--theme-field-bg); color: var(--theme-text); }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    /* поле «Компания/Клиент» — на всю ширину колонки калькулятора */
    .company-group { display: block; margin: 0; }
    #bcCompany {
    width: 100%;
    height: 38px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 20px;
    font-family: 'TT Hoves', sans-serif;
    box-sizing: border-box;
    background: var(--theme-field-bg);
    color: var(--theme-text);
  }
  #bcCompany::placeholder { color: #aaa; }
  button { background: #703D30; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 200px; white-space: nowrap; }
  button:hover { filter: brightness(0.9); }

    /* ===== КНОПКИ-КАРТИНКИ ===== */
    :root {
    --btn-img-h: 225px;   /* эталонная высота кнопки (как в исходных PNG) */
    --btn-scale: 0.265;     /* масштаб всех кнопок (1 = 225px, 0.5 = 112.5px) */
  }
  .btn-grid {
    display: flex;
    flex-direction: row;     /* две колонки рядом */
    gap: 12px;
    align-items: flex-start;
  }
  .btn-col-img {
    display: flex;
    flex-direction: column;  /* друг под другом */
    gap: 12px;
  }
  .img-btn {
    background: transparent;
    border: none;
    padding: 0;
    width: auto;
    cursor: pointer;
    line-height: 0;
    position: relative;
    transition: transform 0.1s;
  }
  /* обе картинки масштабируются по ОДНОЙ высоте → одинаковый масштаб у всех кнопок */
  .img-btn img {
    display: block;
    height: calc(var(--btn-img-h) * var(--btn-scale));  /* единый масштаб */
    width: auto;                                        /* ширина пропорционально */
    pointer-events: none;
  }
       /* светлая картинка всегда видна; тёмная плавно появляется ПОВЕРХ неё */
  .img-btn .img-normal {
    opacity: 1;
  }
  .img-btn .img-hover {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.25s ease-in-out;   /* плавность в ОБЕ стороны */
    will-change: opacity;                     /* подсказка браузеру — без рывка */
  }
  .img-btn:hover:not(:disabled) .img-hover {
    opacity: 1;                               /* появление поверх светлой */
  }
  /* при уводе мыши transition тот же 0.25s → гаснет так же плавно */
  .img-btn:active {
    transform: translateY(1px);
  }
    /* неактивная кнопка-картинка → показываем тёмный вариант (_2.png) */
    .img-btn:disabled {
    cursor: not-allowed;
  }
  .img-btn:disabled .img-normal {
    opacity: 1;            /* светлую НЕ прячем — тёмная ляжет поверх */
  }
  .img-btn:disabled .img-hover {
    opacity: 1;            /* тёмная плавно проявляется поверх светлой */
    transition: opacity 0.25s ease-in-out;
  }
  
  .btn-row { display: flex; gap: 12px; margin-top: 10px; }
  .btn-col { display: flex; flex-direction: column; gap: 6px; margin-top: 0; }
  .btn-col button { width: 220px; white-space: nowrap; }
  
    /* Главная раскладка */
.container { display: flex; flex-direction: column; gap: 12px; }

/* Верхний ряд: конструктор слева + чертёж справа */
.top-row { display: flex; flex-wrap: nowrap; gap: 1px; align-items: flex-start; width: 100%; }
.columns { display: flex; flex-direction: column; gap: 30px; flex: 0 0 349px; width: 349px; margin-top: 20px; margin-left: 10px; }
.columns > .col { display: flex; flex-direction: column; min-height: 800px; gap: 12px; }
.columns > .col .btn-grid { margin-top: auto; }
.col { width: 100%; }
.preview-area { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; overflow: visible; }
/* Нижний ряд: калькулятор + поддон, друг рядом с другом */
.bottom-row { display: flex; flex-wrap: wrap; gap: 60px; align-items: flex-start; width: 100%; margin-top: 40px; }
.bottom-row .col { width: auto; }
  .calc-row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: nowrap; }
  .calc-form { width: calc(var(--label-w) + var(--gap) + var(--field-w)); }
  .arrow { font-size: 40px; color: #555; align-self: flex-start; margin-top: 18px; }
  .result-group { margin-bottom: 6px; display: flex; gap: var(--gap); align-items: center; }
  .result-group label { width: 70px; font-size: 24px; }
  /* В укладке на поддон подписи длиннее — даём им больше места и сдвигаем поля вправо */
  .pallet-results .result-group label { width: 120px; }
    /* Неактивные поля и кнопки */
    input:disabled, select:disabled {
    background: #f0f0f0; color: #aaa; cursor: not-allowed;
  }
  button:disabled {
    background: #b9a9a4; color: #f0f0f0; cursor: not-allowed; filter: none;
  }
  button:disabled:hover { filter: none; }
  
  #btnCalc { width: 220px; white-space: nowrap; }
  
  #preview {
    margin: 20px 0 0 0;
    border: 1px solid #ccc; background: #fff; padding: 10px;
    overflow: hidden;
    width: var(--preview-w); max-width: none;
    height: 800px; min-height: 800px;
    box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 15px;
    position: relative;
    z-index: 500;                              /* поверх правой фигуры (z-index:2) */
    transform: translateX(var(--preview-shift-x));
    border-radius: 8px;
  }
  #preview svg.drawing {
    max-width: 100%; height: auto; display: block;
    transform: translate(var(--preview-offset-x), var(--preview-offset-y));
  }
  
  .version { margin-top: 30px; color: #999; font-size: 10px; }
 
  option:disabled { color: #aaa; }
  
  /* ===== КАСТОМНЫЕ СПИСКИ ===== */
  .cs-wrap { position: relative; width: var(--field-w); z-index: 1; }
  .cs-wrap.open { z-index: 9999; }
  .cs-wrap select.cs-native {
  position: absolute !important; opacity: 0 !important; pointer-events: none !important;
  width: 0 !important; height: 0 !important; margin: 0 !important; padding: 0 !important;
  border: 0 !important; overflow: hidden; clip: rect(0 0 0 0);
}
.cs-display {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px; height: 38px; box-sizing: border-box;
    border: 1px solid #ccc; border-radius: 4px;
    font-size: 20px; cursor: pointer; user-select: none;
    background: var(--theme-field-bg); color: var(--theme-text);
    transition: border-color 0.15s, background 0.2s;
  }
  .cs-display:hover { border-color: #999; }
  .cs-wrap.open .cs-display { border-color: #777; }
  .cs-arrow { margin-left: 8px; font-size: 10px; transition: transform 0.15s; opacity: 0.7; }
  .cs-wrap.open .cs-arrow { transform: rotate(180deg); }
  .cs-list {
    position: absolute; left: 0; top: calc(100% + 4px); z-index: 9999;
    width: 100%; box-sizing: border-box; max-height: 240px; overflow-y: auto;
    border: 1px solid #ccc; border-radius: 8px; padding: 4px;
    background: rgba(255,255,255,0.55);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18); display: none;
  }
  .cs-wrap.cs-disabled .cs-display {
    background: #f0f0f0; color: #aaa; cursor: not-allowed; pointer-events: none;
  }
  .cs-wrap.open .cs-list { display: block; }
  .cs-option { padding: 7px 10px; border-radius: 5px; font-size: 20px; cursor: pointer; transition: background 0.12s; }
  .cs-option:hover { background: rgba(0,0,0,0.08); }
  .cs-option.selected { background: rgba(112,61,48,0.18); }
  .cs-option.disabled { color: #aaa; cursor: not-allowed; }
  .cs-option.disabled:hover { background: transparent; }

  /* кнопка */
  .toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin: 0;
  width: 100%;
  height: 38px;          /* такая же высота, как у .input-group (input height) */
}
.toggle-label {
  font-size: 24px;
  color: var(--theme-text);
  user-select: none;
  cursor: pointer;
  white-space: nowrap;   /* запрет переноса на вторую строку */
}
.ios-toggle {
  position: relative;
  display: inline-block;
  width: 76px;
  height: 38px;
  flex-shrink: 0;
  cursor: pointer;
  line-height: 0;
  vertical-align: middle;
}
.ios-toggle input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.ios-track {
  position: absolute;
  inset: 0;
  border-radius: 18.5px;
  background: var(--theme-toggle-off);
  transition: background 0.28s ease;
  border: none;
}
.ios-thumb {
  position: absolute;
  top: 50%;
  left: 3px;
  width: 31px;
  height: 31px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.28);
  transform: translateY(-50%);
  transition: transform 0.28s cubic-bezier(.4,0,.2,1);
}
.ios-toggle input:checked ~ .ios-track {
  background: var(--theme-toggle-on);
}
.ios-toggle input:checked ~ .ios-thumb {
  transform: translate(39px, -50%);
}
  /* ===== ТЕКСТОВЫЙ ВЫВОД РАСЧЁТОВ ===== */
  .results-text {
    font-size: 24px;
    line-height: 1.7;
    color: #222;
    min-width: 320px;
    display: flex;
    flex-direction: row;
    gap: 80px;
    align-items: flex-start;
  }
  .results-text .res-block { min-width: 280px; }
  .results-text .res-title {
    font-size: 26px;
    margin-bottom: 8px;
    color: #333;
  }
  .results-text .res-line { display: block; }
  /* без выравнивания: значение идёт сразу после ключа с отступом 8px */
  .results-text .res-key {
    margin-right: 8px;
  }
  .results-text .res-val { font-weight: bold; }
  .results-text .res-sep { height: 12px; }
    /* цвет текста по теме */
    body[data-theme="dark"] h2,
  body[data-theme="dark"] label,
  body[data-theme="dark"] .results-text,
  body[data-theme="dark"] .results-text .res-title,
  body[data-theme="eye"] h2,
  body[data-theme="eye"] label,
  body[data-theme="eye"] .results-text,
  body[data-theme="eye"] .results-text .res-title {
    color: var(--theme-text);
  }
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <header class="site-header">
    <img src="logo.png" alt="SABOS" class="logo-img">
    <div class="theme-switch">
      <button type="button" class="theme-btn active" data-set="light" title="Светлая тема"></button>
      <button type="button" class="theme-btn"        data-set="dark"  title="Тёмная тема"></button>
    </div>
  </header>
  
  <!-- КАРКАС ФОНА -->
  <div class="page">
    <div class="center-bg">
      <div class="container">

        <!-- ВЕРХНИЙ РЯД: конструктор + чертёж -->
                <!-- ВЕРХНИЙ РЯД: конструктор + результат + чертёж -->
                <div class="top-row">

                  <div class="columns">
        
          <!-- ===== КОНСТРУКТОР КОРОБА (объединённый) ===== -->
          <div class="col">
            <h2>Калькулятор</h2>
            <div class="input-group"><label>FEFCO</label>
              <select id="bcConstruction"></select>
            </div>
            <div class="input-group"><label>Длина</label><input type="number" id="bcL" placeholder="мм"></div>
            <div class="input-group"><label>Ширина</label><input type="number" id="bcW" placeholder="мм"></div>
            <div class="input-group"><label>Высота</label><input type="number" id="bcH" placeholder="мм"></div>
            <div class="input-group"><label>Профиль</label>
              <select id="bcProfile">
                <option value="E">E</option>
                <option value="B" selected>B</option>
                <option value="C">C</option>
                <option value="BC">BC</option>
                <option value="EB" disabled>EB</option>
              </select>
            </div>
            <div class="input-group"><label>Поддон</label>
              <select id="palType">
                <option value="800x1200" selected>800x1200</option>
                <option value="1000x1200">1000x1200</option>
              </select>
            </div>
            <div class="input-group"><label>Кратность</label><input type="number" id="palPerStack" placeholder="шт"></div>
            <div class="toggle-row" style="display:none;">
              <label class="toggle-label" for="toggleCoef">Коэф. выхода</label>
              <label class="ios-toggle">
                <input type="checkbox" id="toggleCoef">
                <span class="ios-track"></span>
                <span class="ios-thumb"></span>
              </label>
            </div>
            <div class="toggle-row">
              <label class="toggle-label" for="toggleStamp">Заготовка на штамп</label>
              <label class="ios-toggle">
                <input type="checkbox" id="toggleStamp">
                <span class="ios-track"></span>
                <span class="ios-thumb"></span>
              </label>
            </div>
            <div class="input-group company-group">
              <input type="text" id="bcCompany" placeholder="Компания/Клиент" autocomplete="off">
            </div>

        
                        <!-- результат развёртки (скрыто, используется в JS) -->
                        <input type="hidden" id="resL">
                        <input type="hidden" id="resW">
        
                        <div class="btn-grid">
                          <div class="btn-col-img">
                            <button id="btnPreview" class="img-btn">
                              <img class="img-normal" src="preview_1.png" alt="Предпросмотр">
                              <img class="img-hover"  src="preview_2.png" alt="" aria-hidden="true">
                            </button>
                            <button id="btnCalc" class="img-btn">
                              <img class="img-normal" src="count_1.png" alt="Рассчитать">
                              <img class="img-hover"  src="count_2.png" alt="" aria-hidden="true">
                            </button>
                          </div>
                          <div class="btn-col-img">
                            <button id="btnDownload" class="img-btn">
                              <img class="img-normal" src="download_1.png" alt="Скачать вектор">
                              <img class="img-hover"  src="download_2.png" alt="" aria-hidden="true">
                            </button>
                            <button id="btnPDF" class="img-btn">
                              <img class="img-normal" src="pdf_1.png" alt="Скачать PDF">
                              <img class="img-hover"  src="pdf_2.png" alt="" aria-hidden="true">
                            </button>
                          </div>
                        </div>
          </div>
        
                  </div><!-- /.columns -->
        
                  <div class="preview-area">
                    <div id="preview"></div>
                  </div>
        
                </div><!-- /.top-row -->

                                <!-- НИЖНИЙ РЯД: поддон (настройки) + текстовый вывод -->
                                <div class="bottom-row">
                                <!-- ===== ТЕКСТОВЫЙ ВЫВОД РАСЧЁТОВ ===== -->
                                  <div class="col results-text" id="resultsText"></div>
                          
                            </div><!-- /.bottom-row -->

</div><!-- /.page -->

<script>
(function () {
  var SLOT_W = 8;
  var GLUE_ANGLE_Y = 80;
  var PT = 0.620;
  var CUT_SW = 2 * PT;
  var DIM_SW = 2 * PT;
  // Множитель толщины линий специально для PDF (1 = как на экране)
  var PDF_LINE_BOOST = 1.5;
  var ICON_SCALE    = 0.75; // размер значка (доля от меньшей стороны: панель/флап)
  var ICON_PAD_X    = 0.015; // отступ от ПРАВОГО края панели (в долях размера значка)
  var ICON_PAD_Y    = 0.15; // доп. смещение по вертикали (в долях; центрируется автоматически)

  var ICON_MOON = "\uD83C\uDF18";
  var ICON_SUN  = "\u2600\uFE0F";

  function roundFlap(x) { return Math.floor(x); }

  var PROFILES = {
    'B':  { glue: 30, wallH: function (l,w,h){return h+3;}, flapH: function (l,w,h){return roundFlap((w+4)/2);}, panels: function (l,w,h){return [w+2,l+3,w+3,l+2];} },
    'E':  { glue: 30, wallH: function (l,w,h){return h+2;}, flapH: function (l,w,h){return roundFlap((w+2)/2);}, panels: function (l,w,h){return [w+1,l+2,w+2,l+1];} },
    'C':  { glue: 35, wallH: function (l,w,h){return h+4;}, flapH: function (l,w,h){return roundFlap((w+5)/2);}, panels: function (l,w,h){return [w+2,l+4,w+4,l+2];} },
    'BC': { glue: 45, wallH: function (l,w,h){return h+9;}, flapH: function (l,w,h){return roundFlap((w+12)/2);}, panels: function (l,w,h){return [w+4,l+6,w+6,l+4];} },
    'EB': { glue: 40, wallH: function (l,w,h){return h+7;}, flapH: function (l,w,h){return roundFlap((w+7)/2);}, panels: function (l,w,h){return [w+3,l+5,w+5,l+3];} }
  };
  // Добавка к высоте стенки для КВАДРАТНЫХ коробов (l === w)
  var SQUARE_WALL_ADD = { 'E': 4, 'B': 6, 'C': 9, 'BC': 15, 'EB': 10 };

  // Возвращает wallH с учётом квадратности
  function wallHeight(P, l, w, h, profileKey) {
    if (l === w && SQUARE_WALL_ADD[profileKey] != null) {
      return h + SQUARE_WALL_ADD[profileKey];
    }
    return P.wallH(l, w, h);
  }
  function calc(l, w, h, profileKey) {
    var P = PROFILES[profileKey] || PROFILES['B'];
    var GLUE = P.glue;
    var flapH = P.flapH(l, w, h);
    var wallH = wallHeight(P, l, w, h, profileKey);
    var totalH = flapH * 2 + wallH;
    var panels = P.panels(l, w, h);
    var bodyW = panels.reduce(function (a, b) { return a + b; }, 0);
    var totalW = GLUE + bodyW;
    var slantRise = GLUE / Math.tan(GLUE_ANGLE_Y * Math.PI / 180);
    return { GLUE: GLUE, flapH: flapH, wallH: wallH, totalH: totalH, panels: panels, totalW: totalW, slantRise: slantRise };
  }

  // ── Припуски и клеевые клапаны для ПОЛОВИНОК 0201 ──
  // glue — клеевой клапан; addW — припуск к ширине; addL — припуск к длине
  var HALF_PARAMS = {
    'E':  { glue: 40, addW: 2, addL: 2 },
    'B':  { glue: 40, addW: 3, addL: 3 },
    'C':  { glue: 45, addW: 4, addL: 4 },
    'EB': { glue: 40, addW: 5, addL: 5 },
    'BC': { glue: 50, addW: 6, addL: 6 }
  };

  // Половина короба 0201: клеевой клапан + панели [W, L], правый край — прямая линия.
  function calcHalf(l, w, h, profileKey) {
    var P = PROFILES[profileKey] || PROFILES['B'];
    var HP = HALF_PARAMS[profileKey] || HALF_PARAMS['B'];
    var GLUE = HP.glue;
    var flapH = P.flapH(l, w, h);
    var wallH = wallHeight(P, l, w, h, profileKey);
    var totalH = flapH * 2 + wallH;
    // панели половинки: ширина (W+addW), длина (L+addL)
    var panels = [w + HP.addW, l + HP.addL];
    var bodyW = panels.reduce(function (a, b) { return a + b; }, 0);
    var totalW = GLUE + bodyW;
    var slantRise = GLUE / Math.tan(GLUE_ANGLE_Y * Math.PI / 180);
    return { GLUE: GLUE, flapH: flapH, wallH: wallH, totalH: totalH, panels: panels, totalW: totalW, slantRise: slantRise, half: true };
  }

    // Лимит листа: ширина (вертикаль) ≤ 1200, длина (горизонталь) ≤ 2500.
    var SHEET_MAX_W = 1200;  // вертикаль = totalH
  var SHEET_MAX_L = 2500;  // горизонталь = totalW

  // Решает: ПОЛНЫЙ короб (если влезает в лист) или ДВЕ половинки.
  function calc0201(l, w, h, profileKey) {
    var full = calc(l, w, h, profileKey);   // полный короб со старыми припусками
    var fitsFull = (full.totalW <= SHEET_MAX_L) && (full.totalH <= SHEET_MAX_W);
    if (fitsFull) {
      full.twoHalves = false;
      return full;                            // строим обычный короб через buildSVG
    }
    // не влезает → строим из двух половин
    var half = calcHalf(l, w, h, profileKey);
    half.twoHalves = true;
    return half;
  }

  function L(x1, y1, x2, y2, cls) {
    return '<line class="' + cls + '" x1="' + x1.toFixed(3) + '" y1="' + y1.toFixed(3) + '" x2="' + x2.toFixed(3) + '" y2="' + y2.toFixed(3) + '" />';
  }

    // Значок направления гофры. Исходный viewBox 0 0 3000 3000.
  // x,y — левый верхний угол; size — итоговый размер стороны (в мм чертежа).
  function corrugationIcon(x, y, size) {
    var s = size / 3000;
    var sw = 55.28; // толщина линий из исходника
    var inner =
      '<line x1="890.09" y1="2409.61" x2="890.09" y2="780.7"/>' +
      '<path d="M890.09 780.7c451.44,534.5 948.55,1031.61 1483.06,1483.06 -157.34,-477.5 -226.55,-980.84 -203.92,-1483.07 -365.4,327.3 -913.75,327.31 -1279.15,0.02"/>' +
      '<path d="M892.98 2409.61c23.55,-7.29 63.2,-11.66 105.78,-11.66 42.57,0 82.21,4.37 105.76,11.66 0.19,12.04 47.16,21.69 105.77,21.73 58.61,-0.04 105.58,-9.69 105.77,-21.73 23.55,-7.29 63.19,-11.66 105.77,-11.66 42.58,0 82.23,4.37 105.78,11.66 0.19,12.04 47.16,21.69 105.77,21.72 58.6,-0.03 105.57,-9.68 105.75,-21.72 23.56,-7.29 63.2,-11.66 105.78,-11.66 42.58,0 82.23,4.37 105.78,11.66 0.18,12.04 47.16,21.69 105.76,21.72 58.6,-0.03 105.58,-9.68 105.76,-21.72 23.55,-7.28 63.2,-11.65 105.76,-11.66 42.58,0.01 82.23,4.38 105.77,11.66"/>' +
      '<line x1="1101.96" y1="2408.84" x2="1101.95" y2="1025.84"/>' +
      '<line x1="1313.82" y1="2414.03" x2="1313.82" y2="1260.16"/>' +
      '<line x1="1525.7" y1="2409.03" x2="1525.7" y2="1484.45"/>' +
      '<line x1="1737.57" y1="2413.3" x2="1737.57" y2="1685.69"/>' +
      '<line x1="1949.43" y1="2409.22" x2="1949.43" y2="1895.65"/>' +
      '<line x1="2161.31" y1="2412.4" x2="2161.31" y2="2078.14"/>' +
      '<line x1="2373.15" y1="2409.61" x2="2373.15" y2="2268.24"/>';
      return '<g class="corr" transform="translate(' + x + ',' + y + ') scale(' + s + ')" ' +
           'style="stroke:#454545;stroke-width:' + sw + ';stroke-linecap:round;stroke-linejoin:round;fill:none;">' +
           inner + '</g>';
  }

  // Стрелка-треугольник на конце размерной линии.
  // (x,y) — позиция острия; angleDeg — куда смотрит остриё (0=вправо,180=влево,90=вниз,-90=вверх);
  // size — длина стрелки (в мм чертежа).
  function arrowTri(x, y, angleDeg, size) {
    var w = size * 0.35 * 0.45;     // ширина основания -30%
    var a = angleDeg * Math.PI / 180;
    var dx = Math.cos(a), dy = Math.sin(a);      // направление остриё
    var nx = -dy, ny = dx;                       // перпендикуляр
    var tipX = x, tipY = y;
    var bx = x - dx * size, by = y - dy * size;
    var p1x = bx + nx * w, p1y = by + ny * w;
    var p2x = bx - nx * w, p2y = by - ny * w;
    return '<polygon class="dimarr-tri" points="' +
      tipX.toFixed(3) + ',' + tipY.toFixed(3) + ' ' +
      p1x.toFixed(3) + ',' + p1y.toFixed(3) + ' ' +
      p2x.toFixed(3) + ',' + p2y.toFixed(3) + '" />';
  }

  function buildSVG(d, withDims, forPDF) {
    var GLUE = d.GLUE;
    var flapH = d.flapH, wallH = d.wallH, totalH = d.totalH, panels = d.panels, totalW = d.totalW, slantRise = d.slantRise;
    var y0 = 0, y1 = flapH, y2 = flapH + wallH, y3 = totalH;
    var xs = [GLUE];
    for (var p = 0; p < panels.length; p++) xs.push(xs[xs.length - 1] + panels[p]);
    var last = panels.length;
    var cut = [], fold = [];

    cut.push(L(GLUE, y1, 0, y1 + slantRise, 'cut'));
    cut.push(L(0, y1 + slantRise, 0, y2 - slantRise, 'cut'));
    cut.push(L(0, y2 - slantRise, GLUE, y2, 'cut'));

            // ===== ШТРИХОВКА КЛЕЕВОГО КЛАПАНА =====
    // Клапан — трапеция с вершинами (правый край x=GLUE: y1..y2; левый край x=0: y1+slantRise..y2-slantRise)
    var HATCH_COUNT = 12;  // желаемое кол-во штрихов
    // зона по правому краю, где стоят начала штрихов (с равными отступами сверху и снизу)
    var hbStep = (y2 - y1) / (HATCH_COUNT + 1);   // равный отступ = первый штрих тоже отступает
    var hbDX = -1, hbDY = slantRise / GLUE;        // направление вдоль скоса (вниз-влево)

    // границы трапеции как функции от y:
    //   верхний скос: линия из (GLUE,y1) в (0,y1+slantRise)
    //   нижний скос:  линия из (0,y2-slantRise) в (GLUE,y2)
    //   левый край:   x=0
    var hatch = [];
    for (var hi = 1; hi <= HATCH_COUNT; hi++) {
      var sy = y1 + hbStep * hi;   // старт на правом крае клапана, с отступом
      var sx = GLUE;
      // штрих идёт в направлении (hbDX,hbDY); найдём, где он упрётся в границу.
      // параметрически: x = sx + hbDX*t, y = sy + hbDY*t, t>=0
      var tEnd = Infinity;

      // 1) левый край x=0  ->  t = sx / 1 (т.к. hbDX=-1)
      var tLeft = sx;                 // sx + (-1)*t = 0  => t = sx
      if (tLeft >= 0) tEnd = Math.min(tEnd, tLeft);

      // 2) нижний скос: проходит через (0, y2-slantRise) и (GLUE, y2),
      //    его уравнение: y = (y2 - slantRise) + (slantRise/GLUE)*x
      //    подставляем x,y от t:
      //    sy+hbDY*t = (y2-slantRise) + (slantRise/GLUE)*(sx+hbDX*t)
      var kb = slantRise / GLUE;
      var denomB = hbDY - kb * hbDX;
      if (Math.abs(denomB) > 1e-9) {
        var tBot = ((y2 - slantRise) + kb * sx - sy) / denomB;
        if (tBot >= 0) tEnd = Math.min(tEnd, tBot);
      }

      if (!isFinite(tEnd) || tEnd <= 0) continue;
      var ex = sx + hbDX * tEnd;
      var ey = sy + hbDY * tEnd;
      hatch.push(L(sx, sy, ex, ey, 'cut'));
    }
    cut = cut.concat(hatch);

    var isHalf = d.half === true;
    function flapLeft(i)  { return (i === 0) ? xs[i] : xs[i] + SLOT_W / 2; }
    function flapRight(i) {
      // последняя панель: если это половинка — правый край ПРЯМОЙ (без офсета)
      if (i === last - 1) return xs[i + 1];
      return xs[i + 1] - SLOT_W / 2;
    }

    var i, xL, xR;
    for (i = 0; i < panels.length; i++) {
      xL = flapLeft(i); xR = flapRight(i);
      cut.push(L(xL, y0, xR, y0, 'cut'));
      cut.push(L(xL, y3, xR, y3, 'cut'));
    }
    for (i = 0; i < panels.length; i++) {
      xL = flapLeft(i); xR = flapRight(i);
      cut.push(L(xL, y0, xL, y1, 'cut'));
      cut.push(L(xR, y0, xR, y1, 'cut'));
      cut.push(L(xL, y2, xL, y3, 'cut'));
      cut.push(L(xR, y2, xR, y3, 'cut'));
    }
    if (isHalf) {
      // правый край половинки — сплошная прямая линия от верха до низа
      cut.push(L(xs[last], y0, xs[last], y3, 'cut'));
    } else {
      cut.push(L(xs[last], y1, xs[last], y2, 'cut'));
    }

    fold.push(L(GLUE, y1, totalW, y1, 'fold'));
    fold.push(L(GLUE, y2, totalW, y2, 'fold'));
    for (i = 1; i < panels.length; i++) fold.push(L(xs[i], y1, xs[i], y2, 'fold'));
    fold.push(L(GLUE, y1, GLUE, y2, 'fold'));

    var dims = '';
    if (withDims) {
      var base = Math.max(totalW, totalH);
      var fontSize = base * 0.018 * 1.2 * 1.2;
      var off = base * 0.06;
      var tick = off * 0.1125;
      var extTick = tick * 5.5;     // длина выносок (синие линии к чертежу)
      var arrLen = tick * 2.2;      // длина стрелки
      var txtGap = tick * 1.5;
      var vTxtGap = tick * 2.5;

      // ===== ГОРИЗОНТАЛЬНЫЕ РАЗМЕРЫ СЕКЦИЙ (под чертежом) =====
      var dimY = y3 + off;
      var xMarks = [0, GLUE];
      for (var xi = 1; xi <= panels.length; xi++) xMarks.push(xs[xi]);
      var labels = [GLUE];
      for (var li = 0; li < panels.length; li++) labels.push(panels[li]);
      // i=0 — клеевой клапан (GLUE), его размер не показываем
      for (i = 1; i < xMarks.length - 1; i++) {
        var a = xMarks[i], b = xMarks[i + 1], mid = (a + b) / 2;
        var isFirst = (i === 1);
        var isLast = (i === xMarks.length - 2);
        dims += L(a, dimY, b, dimY, 'dim');
        dims += L(a, dimY - extTick, a, dimY + tick, 'dim');
        dims += L(b, dimY - extTick, b, dimY + tick, 'dim');
        // крайняя левая стрелка (первая засечка) — наружу (влево); остальные — внутрь
        dims += arrowTri(a, dimY, isFirst ? 180 : 0, arrLen);
        // крайняя правая стрелка (последняя засечка) — наружу (вправо); остальные — внутрь
        dims += arrowTri(b, dimY, isLast ? 0 : 180, arrLen);
        dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + mid + '" y="' + (dimY - txtGap) + '" text-anchor="middle">' + labels[i] + '</text>';
      }
      // ===== ОБЩАЯ ШИРИНА =====
      var totY = dimY + off;
      dims += L(0, totY, totalW, totY, 'dim');
      dims += arrowTri(0, totY, 180, arrLen);
      dims += arrowTri(totalW, totY, 0, arrLen);
      dims += L(0, dimY - extTick, 0, totY + tick, 'dim');
      dims += L(totalW, totY - extTick, totalW, totY + tick, 'dim');
      dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + (totalW / 2) + '" y="' + (totY - txtGap) + '" text-anchor="middle">' + totalW + '</text>';

      // ===== ВЕРТИКАЛЬНЫЕ РАЗМЕРЫ СЕКЦИЙ (справа от чертежа) =====
      var dimX = totalW + off;
      var yMarks = [{ a: y0, b: y1, label: flapH }, { a: y1, b: y2, label: wallH }, { a: y2, b: y3, label: flapH }];
      for (var k = 0; k < yMarks.length; k++) {
        var m = yMarks[k];
        var midv = (m.a + m.b) / 2;
        var isTop = (k === 0);
        var isBot = (k === yMarks.length - 1);
        dims += L(dimX, m.a, dimX, m.b, 'dim');
        dims += L(dimX - extTick, m.a, dimX + tick, m.a, 'dim');
        dims += L(dimX - extTick, m.b, dimX + tick, m.b, 'dim');
        // крайняя верхняя стрелка — наружу (вверх); остальные — внутрь (вниз)
        dims += arrowTri(dimX, m.a, isTop ? -90 : 90, arrLen);
        // крайняя нижняя стрелка — наружу (вниз); остальные — внутрь (вверх)
        dims += arrowTri(dimX, m.b, isBot ? 90 : -90, arrLen);
        dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + (dimX - vTxtGap) + '" y="' + midv + '" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 ' + (dimX - vTxtGap) + ' ' + midv + ')">' + m.label + '</text>';
      }

            // ===== ОБЩАЯ ВЫСОТА =====
            var totX = dimX + off, midY = totalH / 2;
      dims += L(totX, y0, totX, y3, 'dim');
      dims += arrowTri(totX, y0, -90, arrLen);   // верхняя — внутрь
      dims += arrowTri(totX, y3, 90, arrLen);    // нижняя — внутрь
      dims += L(totX - extTick, y0, totX + tick, y0, 'dim');
      dims += L(totX - extTick, y3, totX + tick, y3, 'dim');
      dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + (totX - vTxtGap) + '" y="' + midY + '" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 ' + (totX - vTxtGap) + ' ' + midY + ')">' + totalH + '</text>';
    }
    // значок гофры — жёстко в нижнем правом углу последней панели.
    // Всё считается в долях от iconSize → при любых габаритах положение в углу одинаковое.
    var lastPanel = panels[panels.length - 1];
    var iconSize = Math.min(lastPanel, flapH) * ICON_SCALE;
    // правый край значка отступает от правого края панели на ICON_PAD_X * iconSize
    var iconX = xs[last] - iconSize - ICON_PAD_X * iconSize;
    // по вертикали центрируем в нижнем флапе + относительное смещение
    var iconY = y2 + (flapH - iconSize) / 2 + ICON_PAD_Y * iconSize;
    var corrIcon = corrugationIcon(iconX, iconY, iconSize);
    var margin = withDims ? Math.max(totalW, totalH) * 0.20 : 2;
    var vbX = withDims ? -margin * 0.3 : 0;
    var vbY = withDims ? -margin * 0.1 : 0;
    var vbW = totalW + (withDims ? margin * 1.8 : 0);
    var vbH = totalH + (withDims ? margin * 1.5 : 0);
    var vb = vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH;
    var sizeAttr = withDims ? '' : 'width="' + totalW + 'mm" height="' + totalH + 'mm"';
    var cls = withDims ? 'class="drawing"' : '';

        // В PDF: убираем non-scaling-stroke и делаем линии толще, пунктир крупнее
        var boost = forPDF ? PDF_LINE_BOOST : 1.25;
    var cutSW = CUT_SW * boost;
    var dimSW = DIM_SW * boost;
    var dashArr = forPDF ? (4 * boost) + ' ' + (2 * boost) : '4 2';
    var vecEff = forPDF ? '' : 'vector-effect:non-scaling-stroke;';

    return '<svg xmlns="http://www.w3.org/2000/svg" ' + cls + ' viewBox="' + vb + '" ' + sizeAttr + ' preserveAspectRatio="xMidYMid meet">' +
      '<style>' +
      '.cut{stroke:#454545;stroke-width:' + cutSW + ';fill:none;' + vecEff + '}' +
      '.fold{stroke:#454545;stroke-width:' + cutSW + ';fill:none;stroke-dasharray:' + dashArr + ';' + vecEff + '}' +
      '.dim{stroke:#454545;stroke-width:' + dimSW + ';stroke-linecap:round;' + vecEff + '}' +
      '.dimarr-tri{fill:#454545;stroke:none;}' +
      '.dimtxt{font-family:Arial,sans-serif;font-weight:bold;fill:#454545;}' +
      '</style>' + cut.join('') + fold.join('') + dims + corrIcon + '</svg>';
  }
  // Обёртка: строит 0201 из одной или двух половин.
  function buildSVG0201(d, withDims, forPDF) {
    if (!d.twoHalves) {
      // полный короб (влезает в лист) — рисуем как обычно
      return buildSVG(d, withDims, forPDF);
    }

    // ── ДВЕ ПОЛОВИНЫ ──
    // Вторая половина примыкает справа: её клеевой клапан накладывается
    // на длинную панель (L) первой половины. Стык — по правому краю первой L.
    var GLUE = d.GLUE, flapH = d.flapH, wallH = d.wallH, totalH = d.totalH;
    var panels = d.panels, slantRise = d.slantRise;
    var y0 = 0, y1 = flapH, y2 = flapH + wallH, y3 = totalH;

    // координаты первой половины
    var xs = [GLUE];
    for (var p = 0; p < panels.length; p++) xs.push(xs[xs.length - 1] + panels[p]);
    // xs = [GLUE, GLUE+W, GLUE+W+L] ; конец первой половины = xs[2]

    // Вторая половина = зеркальная копия первой по горизонтали,
    // приставленная так, что её клеевой клапан ложится на L первой.
    // Ширина одной половины (тело без клапана) = W + L.
    // Полная развёртка двух половин по ширине:
    //   GLUE(1) + W1 + L1 + W2 + L2 (клапан 2 наложен на L1, не добавляет ширины)
    var W = panels[0], Lp = panels[1];
    var firstEnd = xs[2];                 // конец первой L = линия стыка (сгиб)
    // Вторая половина примыкает справа. Её клеевой клапан накладывается
    // на L первой (зона шириной GLUE слева от стыка). Тело второй: W, затем L.
    var x2W = firstEnd;                   // начало W второй половины (= стык)
    var x2L = x2W + W;                    // начало L второй половины
    var x2End = x2L + Lp;                 // конец второй половины

    var totalW2 = x2End;                  // общая ширина двух половин

    var cut = [], fold = [];

    // ── ПЕРВАЯ ПОЛОВИНА (с клеевым клапаном слева и штриховкой) ──
    cut.push(L(GLUE, y1, 0, y1 + slantRise, 'cut'));
    cut.push(L(0, y1 + slantRise, 0, y2 - slantRise, 'cut'));
    cut.push(L(0, y2 - slantRise, GLUE, y2, 'cut'));
    cut = cut.concat(hatchGlue(GLUE, y1, y2, slantRise));

    var firstXs = [GLUE, xs[1], xs[2]];
    appendPanels(cut, fold, firstXs, y0, y1, y2, y3, true, false);

    // ── ВТОРАЯ ПОЛОВИНА ──
    var secondXs = [x2W, x2L, x2End];
    appendPanels(cut, fold, secondXs, y0, y1, y2, y3, false, true, true);

    // ── КЛЕЕВОЙ КЛАПАН ВТОРОЙ ПОЛОВИНЫ (наложен на L первой, слева от стыка) ──
    // Рисуем трапецию-клапан внутрь первой L: правый край у стыка (x=firstEnd),
    // левый скошенный край на x = firstEnd - GLUE.
    var gl2R = firstEnd;                 // правый край клапана 2 (у стыка)
    var gl2L = firstEnd - GLUE;          // левый край клапана 2
    cut.push(L(gl2R, y1, gl2L, y1 + slantRise, 'cut'));
    cut.push(L(gl2L, y1 + slantRise, gl2L, y2 - slantRise, 'cut'));
    cut.push(L(gl2L, y2 - slantRise, gl2R, y2, 'cut'));
    // штриховка клапана 2 (зеркальная: идёт вправо-вниз)
    cut = cut.concat(hatchGlueMirror(gl2L, gl2R, y1, y2, slantRise));

    // ── СТЫК: только ОДНА линия сгиба (двойных резов больше нет) ──
    fold.push(L(firstEnd, y1, firstEnd, y2, 'fold'));

    // замыкающая прямая правого края второй половины
    cut.push(L(x2End, y0, x2End, y3, 'cut'));

    // внешние горизонтальные линии сгиба
    fold.push(L(GLUE, y1, totalW2, y1, 'fold'));
    fold.push(L(GLUE, y2, totalW2, y2, 'fold'));
    fold.push(L(GLUE, y1, GLUE, y2, 'fold')); // левый сгиб клапана первой

    // ── значок гофры в углу последней панели второй половины ──
    var lastPanel = Lp;
    var iconSize = Math.min(lastPanel, flapH) * ICON_SCALE;
    var iconX = x2End - iconSize - ICON_PAD_X * iconSize;
    var iconY = y2 + (flapH - iconSize) / 2 + ICON_PAD_Y * iconSize;
    var corrIcon = corrugationIcon(iconX, iconY, iconSize);

    // ── размеры (упрощённо: общая ширина/высота) ──
    var dims = '';
    if (withDims) {
      var base = Math.max(totalW2, totalH);
      var fontSize = base * 0.018 * 1.2 * 1.2;
      var off = base * 0.06;
      var tick = off * 0.1125;
      var extTick = tick * 5.5;
      var arrLen = tick * 2.2;
      var txtGap = tick * 1.5;
      var vTxtGap = tick * 2.5;

      // горизонтальные секции
      var marks = [0, GLUE, xs[1], xs[2], x2L, x2End];
      var lbls  = [GLUE, W, Lp, W, Lp];
      var dimY = y3 + off;
      for (var i = 1; i < marks.length - 1; i++) {
        var a = marks[i], b = marks[i + 1], mid = (a + b) / 2;
        var isFirst = (i === 1), isLast = (i === marks.length - 2);
        dims += L(a, dimY, b, dimY, 'dim');
        dims += L(a, dimY - extTick, a, dimY + tick, 'dim');
        dims += L(b, dimY - extTick, b, dimY + tick, 'dim');
        dims += arrowTri(a, dimY, isFirst ? 180 : 0, arrLen);
        dims += arrowTri(b, dimY, isLast ? 0 : 180, arrLen);
        dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + mid + '" y="' + (dimY - txtGap) + '" text-anchor="middle">' + lbls[i] + '</text>';
      }
            // ===== ДЛИНА ОДНОЙ ПОЛОВИНКИ (от клапана x=0 до линии стыка firstEnd) =====
      // располагается МЕЖДУ размерами секций и общей шириной развёртки
      var halfY = dimY + off;                  // строка длины половинки
      var halfLen = Math.round(firstEnd);      // от 0 до стыка = клапан + W + L первой половины
      dims += L(0, halfY, firstEnd, halfY, 'dim');
      dims += arrowTri(0, halfY, 180, arrLen);
      dims += arrowTri(firstEnd, halfY, 0, arrLen);
      dims += L(0, dimY - extTick, 0, halfY + tick, 'dim');
      dims += L(firstEnd, dimY - extTick, firstEnd, halfY + tick, 'dim');
      dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + (firstEnd/2) + '" y="' + (halfY - txtGap) + '" text-anchor="middle">' + halfLen + '</text>';

      // общая ширина (сдвинута ещё на off ниже — под линией длины половинки)
      var totY = halfY + off;
      dims += L(0, totY, totalW2, totY, 'dim');
      dims += arrowTri(0, totY, 180, arrLen);
      dims += arrowTri(totalW2, totY, 0, arrLen);
      dims += L(0, halfY - extTick, 0, totY + tick, 'dim');
      dims += L(totalW2, totY - extTick, totalW2, totY + tick, 'dim');
      dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + (totalW2/2) + '" y="' + (totY - txtGap) + '" text-anchor="middle">' + totalW2 + '</text>';

      // вертикальные секции справа
      var dimX = totalW2 + off;
      var yMarks = [{a:y0,b:y1,label:flapH},{a:y1,b:y2,label:wallH},{a:y2,b:y3,label:flapH}];
      for (var k = 0; k < yMarks.length; k++) {
        var m = yMarks[k], midv = (m.a + m.b)/2;
        var isTop = (k===0), isBot = (k===yMarks.length-1);
        dims += L(dimX, m.a, dimX, m.b, 'dim');
        dims += L(dimX - extTick, m.a, dimX + tick, m.a, 'dim');
        dims += L(dimX - extTick, m.b, dimX + tick, m.b, 'dim');
        dims += arrowTri(dimX, m.a, isTop ? -90 : 90, arrLen);
        dims += arrowTri(dimX, m.b, isBot ? 90 : -90, arrLen);
        dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + (dimX - vTxtGap) + '" y="' + midv + '" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 ' + (dimX - vTxtGap) + ' ' + midv + ')">' + m.label + '</text>';
      }
      var totX = dimX + off;
      dims += L(totX, y0, totX, y3, 'dim');
      dims += arrowTri(totX, y0, -90, arrLen);
      dims += arrowTri(totX, y3, 90, arrLen);
      dims += L(totX - extTick, y0, totX + tick, y0, 'dim');
      dims += L(totX - extTick, y3, totX + tick, y3, 'dim');
      dims += '<text class="dimtxt" style="font-size:' + fontSize + 'px" x="' + (totX - vTxtGap) + '" y="' + (totalH/2) + '" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 ' + (totX - vTxtGap) + ' ' + (totalH/2) + ')">' + totalH + '</text>';
    }

    // viewBox
    var margin = withDims ? Math.max(totalW2, totalH) * 0.20 : 2;
    var vbX = withDims ? -margin * 0.3 : 0;
    var vbY = withDims ? -margin * 0.1 : 0;
    var vbW = totalW2 + (withDims ? margin * 1.8 : 0);
    var vbH = totalH + (withDims ? margin * 1.5 : 0);   
    var vb = vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH;
    var sizeAttr = withDims ? '' : 'width="' + totalW2 + 'mm" height="' + totalH + 'mm"';
    var cls = withDims ? 'class="drawing"' : '';

    var boost = forPDF ? PDF_LINE_BOOST : 1.25;
    var cutSW = CUT_SW * boost, dimSW = DIM_SW * boost;
    var dashArr = forPDF ? (4 * boost) + ' ' + (2 * boost) : '4 2';
    var vecEff = forPDF ? '' : 'vector-effect:non-scaling-stroke;';

    return '<svg xmlns="http://www.w3.org/2000/svg" ' + cls + ' viewBox="' + vb + '" ' + sizeAttr + ' preserveAspectRatio="xMidYMid meet">' +
      '<style>' +
      '.cut{stroke:#454545;stroke-width:' + cutSW + ';fill:none;' + vecEff + '}' +
      '.fold{stroke:#454545;stroke-width:' + cutSW + ';fill:none;stroke-dasharray:' + dashArr + ';' + vecEff + '}' +
      '.dim{stroke:#454545;stroke-width:' + dimSW + ';stroke-linecap:round;' + vecEff + '}' +
      '.dimarr-tri{fill:#454545;stroke:none;}' +
      '.dimtxt{font-family:Arial,sans-serif;font-weight:bold;fill:#454545;}' +
      '</style>' + cut.join('') + fold.join('') + dims + corrIcon + '</svg>';
  }

  // ── вспомогательные функции для buildSVG0201 ──

  // штриховка клеевого клапана (вынесена из buildSVG)
  function hatchGlue(GLUE, y1, y2, slantRise) {
    var HATCH_COUNT = 12;
    var hbStep = (y2 - y1) / (HATCH_COUNT + 1);
    var hbDX = -1, hbDY = slantRise / GLUE;
    var out = [];
    for (var hi = 1; hi <= HATCH_COUNT; hi++) {
      var sy = y1 + hbStep * hi, sx = GLUE, tEnd = Infinity;
      var tLeft = sx; if (tLeft >= 0) tEnd = Math.min(tEnd, tLeft);
      var kb = slantRise / GLUE, denomB = hbDY - kb * hbDX;
      if (Math.abs(denomB) > 1e-9) {
        var tBot = ((y2 - slantRise) + kb * sx - sy) / denomB;
        if (tBot >= 0) tEnd = Math.min(tEnd, tBot);
      }
      if (!isFinite(tEnd) || tEnd <= 0) continue;
      out.push(L(sx, sy, sx + hbDX * tEnd, sy + hbDY * tEnd, 'cut'));
    }
    return out;
  }
    // штриховка клапана 2 — ТАКАЯ ЖЕ как у первого (вниз-влево), но в зоне [gl2L..gl2R]
    function hatchGlueMirror(gl2L, gl2R, y1, y2, slantRise) {
    var HATCH_COUNT = 12;
    var hbStep = (y2 - y1) / (HATCH_COUNT + 1);
    var GLUE = gl2R - gl2L;
    var hbDX = -1, hbDY = slantRise / GLUE;   // вниз-влево — как у первого клапана
    var out = [];
    for (var hi = 1; hi <= HATCH_COUNT; hi++) {
      var sy = y1 + hbStep * hi, sx = gl2R, tEnd = Infinity;
      // 1) левый край клапана x = gl2L
      var tLeft = sx - gl2L; if (tLeft >= 0) tEnd = Math.min(tEnd, tLeft);
      // 2) нижний скос: из (gl2L, y2-slantRise) в (gl2R, y2)
      //    y = (y2 - slantRise) + (slantRise/GLUE)*(x - gl2L)
      var kb = slantRise / GLUE, denomB = hbDY - kb * hbDX;
      if (Math.abs(denomB) > 1e-9) {
        var tBot = ((y2 - slantRise) + kb * (sx - gl2L) - sy) / denomB;
        if (tBot >= 0) tEnd = Math.min(tEnd, tBot);
      }
      if (!isFinite(tEnd) || tEnd <= 0) continue;
      out.push(L(sx, sy, sx + hbDX * tEnd, sy + hbDY * tEnd, 'cut'));
    }
    return out;
  }

    // рисует панели по списку стыков secXs=[xStart, x1, xEnd] (2 панели)
  // skipLeftCut — не рисовать левый вертикальный рез первой панели (для стыка половин)
  function appendPanels(cut, fold, secXs, y0, y1, y2, y3, leftFold, rightStraight, skipLeftCut) {
    var n = secXs.length - 1; // число панелей
    function fl(i){ return (i === 0) ? secXs[i] : secXs[i] + SLOT_W/2; }
    function fr(i){ return (i === n-1) ? secXs[i+1] : secXs[i+1] - SLOT_W/2; }
    var i, xL, xR;
    for (i = 0; i < n; i++) {
      xL = fl(i); xR = fr(i);
      cut.push(L(xL, y0, xR, y0, 'cut'));
      cut.push(L(xL, y3, xR, y3, 'cut'));
    }
    for (i = 0; i < n; i++) {
      xL = fl(i); xR = fr(i);
      // пропускаем левый рез самой первой панели, если это стык половин
      if (!(i === 0 && skipLeftCut)) {
        cut.push(L(xL, y0, xL, y1, 'cut'));
        cut.push(L(xL, y2, xL, y3, 'cut'));
      }
      cut.push(L(xR, y0, xR, y1, 'cut'));
      cut.push(L(xR, y2, xR, y3, 'cut'));
    }
    for (i = 1; i < n; i++) fold.push(L(secXs[i], y1, secXs[i], y2, 'fold'));
  }
  function readBC() {
    var l = parseFloat(document.getElementById('bcL').value);
    var w = parseFloat(document.getElementById('bcW').value);
    var h = parseFloat(document.getElementById('bcH').value);
    var profile = document.getElementById('bcProfile').value;
    if (!PROFILES[profile]) { alert("Этот профиль пока недоступен."); return null; }
    if (!l || !w || !h) { alert("Введите все размеры!"); return null; }
    return { l: l, w: w, h: h, profile: profile };
  }
    // префикс из поля «Компания/Клиент» для имён файлов и заголовков
    function companyPrefix() {
    var el = document.getElementById('bcCompany');
    var name = el ? el.value.trim() : '';
    if (!name) return '';
    // чистим символы, недопустимые в имени файла
    name = name.replace(/[\\/:*?"<>|]+/g, '_');
    return name + '_';
  }

  function previewBox() {
    var v = readBC(); if (!v) return;
    var d = calc0201(v.l, v.w, v.h, v.profile);
    var svg = buildSVG0201(d, true);
    document.getElementById('preview').innerHTML = svg;
  }

  function generateBox() {
    var v = readBC(); if (!v) return;
    var d = calc0201(v.l, v.w, v.h, v.profile);
    var svg = buildSVG0201(d, false);
    var blob = new Blob([svg], { type: "image/svg+xml" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = companyPrefix() + '0201_(' + v.l + 'х' + v.w + 'х' + v.h + ')' + v.profile + '.svg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById('btnDownload').addEventListener('click', generateBox);
  document.getElementById('btnPreview').addEventListener('click', previewBox);
  function generatePDF() {
    var v = readBC(); if (!v) return;

    var dPdf = calc0201(v.l, v.w, v.h, v.profile);
    // SVG чертежа с УСИЛЕННЫМИ линиями для PDF
    var svgString = buildSVG0201(dPdf, true, true);

    var tmp = document.createElement('div');
    tmp.innerHTML = svgString;
    var svgEl = tmp.querySelector('svg');
    var vb = svgEl.getAttribute('viewBox').split(/\s+/).map(parseFloat);
    var drawW = vb[2], drawH = vb[3];

    var RASTER = 4;
    var pxW = Math.round(drawW * RASTER);
    var pxH = Math.round(drawH * RASTER);
    svgEl.setAttribute('width', pxW);
    svgEl.setAttribute('height', pxH);
    var fixedSvg = new XMLSerializer().serializeToString(svgEl);

    var svgBlob = new Blob([fixedSvg], { type: 'image/svg+xml;charset=utf-8' });
    var svgUrl = URL.createObjectURL(svgBlob);

    // 1) грузим чертёж
    var drawImg = new Image();
    drawImg.onload = function () {
      var canvas = document.createElement('canvas');
      canvas.width = pxW; canvas.height = pxH;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, pxW, pxH);
      ctx.drawImage(drawImg, 0, 0, pxW, pxH);
      URL.revokeObjectURL(svgUrl);
      var drawData = canvas.toDataURL('image/png');

            // нижняя картинка удалена — PDF только с чертежом
            placeIntoPDF(drawData, drawW, drawH, null);
    };
    drawImg.onerror = function () {
      URL.revokeObjectURL(svgUrl);
      alert('Не удалось отрисовать чертёж для PDF.');
    };
    drawImg.src = svgUrl;

    function placeIntoPDF(drawData, dW, dH, bottomImage) {
      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      var pageW = pdf.internal.pageSize.getWidth();
      var pageH = pdf.internal.pageSize.getHeight();
      var pad = 12;
      var availW = pageW - pad * 2;
      var availH = pageH - pad * 2;
      var gap = 6; // зазор между чертежом и картинкой (мм)

      // пропорции нижней картинки
      var bImgAspect = bottomImage ? (bottomImage.naturalWidth / bottomImage.naturalHeight) : 0;

      // Подбираем масштаб так, чтобы ОБА блока влезли по высоте и ширине.
      // Нижнюю картинку рисуем долей ширины чертежа (как в предпросмотре — поменьше).
      var BOTTOM_REL_W = 0.42; // ширина картинки относительно ширины чертежа

      // Высота всей композиции при ширине = W:
      //   чертёж: W * (dH/dW)
      //   картинка: (W*BOTTOM_REL_W) / bImgAspect
      function totalHeightAtWidth(W) {
        var h = W * (dH / dW);
        if (bottomImage) h += gap + (W * BOTTOM_REL_W) / bImgAspect;
        return h;
      }

      // Ищем максимальную ширину W <= availW, при которой высота <= availH
      var W = availW;
      if (totalHeightAtWidth(W) > availH) {
        // подгоняем по высоте бинарным поиском
        var lo = 0, hi = availW;
        for (var it = 0; it < 40; it++) {
          var midW = (lo + hi) / 2;
          if (totalHeightAtWidth(midW) <= availH) lo = midW; else hi = midW;
        }
        W = lo;
      }

      var drawOutW = W;
      var drawOutH = W * (dH / dW);
      var botOutW = bottomImage ? W * BOTTOM_REL_W : 0;
      var botOutH = bottomImage ? botOutW / bImgAspect : 0;

      var totalH = drawOutH + (bottomImage ? gap + botOutH : 0);

      // Центрируем весь блок на листе
      var offY = (pageH - totalH) / 2;
      var drawX = (pageW - drawOutW) / 2;
      var drawY = offY;

      pdf.addImage(drawData, 'PNG', drawX, drawY, drawOutW, drawOutH);

      if (bottomImage) {
        var botX = (pageW - botOutW) / 2;
        var botY = drawY + drawOutH + gap;
        try {
          // переводим картинку в dataURL через canvas (на случай PNG с прозрачностью — кладём белый фон)
          var bc = document.createElement('canvas');
          bc.width = bottomImage.naturalWidth;
          bc.height = bottomImage.naturalHeight;
          var bctx = bc.getContext('2d');
          bctx.fillStyle = '#ffffff';
          bctx.fillRect(0, 0, bc.width, bc.height);
          bctx.drawImage(bottomImage, 0, 0);
          var botData = bc.toDataURL('image/png');
          pdf.addImage(botData, 'PNG', botX, botY, botOutW, botOutH);
        } catch (e) {
          // если картинка с другого домена и canvas «загрязнён» — пропускаем её
        }
      }

      pdf.save(companyPrefix() + '0201_(' + v.l + 'х' + v.w + 'х' + v.h + ')' + v.profile + '.pdf');
    }
  }

  document.getElementById('btnPDF').addEventListener('click', generatePDF);

    // ============================================================
  // ТАБЛИЦА ФОРМУЛ КАЛЬКУЛЯТОРА РАЗВЕРТКИ
  // Формат: 'КОНСТРУКЦИЯ': { 'ПРОФИЛЬ': { L: длина_заготовки, W: ширина_заготовки } }
  // В формулах доступны переменные: l, w, h
  // Чтобы добавить формулу — просто впиши новую строку.
  // ============================================================

  html += '<span class="res-line res-val">Профиль недоступен для расчёта паллета</span>';
} else if (data && data.pallet && data.pallet.fits === false) {
  html += '<span class="res-line res-val">Не влезает на поддон</span>';
} else {
  // порядок: Раскладка → Всего шт. → Габариты
  html += '<span class="res-line"><span class="res-key">Раскладка</span> <span class="res-val">' +
    (p.layout != null ? p.layout : '') + '</span></span>';
  html += '<span class="res-line"><span class="res-key">Всего шт.</span> <span class="res-val">' +
    (p.total != null ? p.total : (p.fits ? 'укажи кратность' : '')) + '</span></span>';
  html += '<span class="res-line"><span class="res-key">Габариты</span> <span class="res-val">' +
    (p.gabL != null ? (p.gabL + 'х' + p.gabW + (p.gabH ? 'х' + p.gabH : '')) : '') + '</span></span>';
}
html += '</div>'; // /res-block паллет
    box.innerHTML = html;
  }
  // ============================================================
  // КАСТОМНЫЕ ВЫПАДАЮЩИЕ СПИСКИ (надстройка над нативными <select>)
  // ============================================================
  function buildCustomSelect(selectEl) {
    if (selectEl.dataset.csReady) return;
    selectEl.dataset.csReady = '1';

    var wrap = document.createElement('div');
    wrap.className = 'cs-wrap';
    if (selectEl.disabled) wrap.classList.add('cs-disabled');
    selectEl.parentNode.insertBefore(wrap, selectEl);
    wrap.appendChild(selectEl);
    selectEl.classList.add('cs-native');

    var display = document.createElement('div');
    display.className = 'cs-display';
    var label = document.createElement('span');
    label.className = 'cs-label';
    var arrow = document.createElement('span');
    arrow.className = 'cs-arrow';
    arrow.innerHTML = '\u25BC';
    display.appendChild(label);
    display.appendChild(arrow);
    wrap.appendChild(display);

    var list = document.createElement('div');
    list.className = 'cs-list';
    wrap.appendChild(list);

    function syncLabel() {
      var opt = selectEl.options[selectEl.selectedIndex];
      label.textContent = opt ? opt.textContent : '';
    }

    function rebuild() {
      list.innerHTML = '';
      Array.prototype.forEach.call(selectEl.options, function (opt) {
        var item = document.createElement('div');
        item.className = 'cs-option';
        item.textContent = opt.textContent;
        if (opt.disabled) item.classList.add('disabled');
        if (opt.selected) item.classList.add('selected');
        item.addEventListener('click', function (e) {
          e.stopPropagation();
          if (opt.disabled) return;
          selectEl.value = opt.value;
          selectEl.dispatchEvent(new Event('change', { bubbles: true }));
          syncLabel();
          markSelected();
          close();
        });
        list.appendChild(item);
      });
      syncLabel();
    }

    function markSelected() {
      var items = list.querySelectorAll('.cs-option');
      Array.prototype.forEach.call(selectEl.options, function (opt, i) {
        if (items[i]) items[i].classList.toggle('selected', opt.selected);
      });
    }

    function open() {
      closeAll();
      var rect = wrap.getBoundingClientRect();
      var spaceBelow = window.innerHeight - rect.bottom;
      var listH = 240;
      if (spaceBelow < listH) {
        list.style.top = 'auto';
        list.style.bottom = 'calc(100% + 4px)';
      } else {
        list.style.top = 'calc(100% + 4px)';
        list.style.bottom = 'auto';
      }
      wrap.classList.add('open');
    }
    function close() { wrap.classList.remove('open'); }

    display.addEventListener('click', function (e) {
      e.stopPropagation();
      if (wrap.classList.contains('open')) close(); else open();
    });

    selectEl.addEventListener('change', function () { syncLabel(); markSelected(); });

    rebuild();
    wrap._csRebuild = rebuild;
  }

  var closeAll = function () {
    var opened = document.querySelectorAll('.cs-wrap.open');
    Array.prototype.forEach.call(opened, function (w) { w.classList.remove('open'); });
  };
  document.addEventListener('click', closeAll);

  ['bcConstruction', 'bcProfile', 'palType'].forEach(function (id) {
    var el = document.getElementById(id);
    if (el) buildCustomSelect(el);
  });

        // выставить доступность профилей и кнопок под стартовую конструкцию
        updateProfileAvailability();
  updatePreviewButtons();
  renderResults(null);   // показать пустые блоки "Заготовка" и "Поддон" сразу
  // ── ПЕРЕКЛЮЧЕНИЕ ТЕМЫ ──
  function applyTheme(name) {
    var th = THEME_IMG[name] || THEME_IMG.light;
    document.body.setAttribute('data-theme', name);

    // layout.png справа
    var layoutImg = document.querySelector('.right-bg .box-shape');
    if (layoutImg) layoutImg.src = th.layout;

    // кнопки-картинки: normal = _<n[0]>.png, hover = _<n[1]>.png
    BTN_BASES.forEach(function (base) {
      // находим кнопку по id (btnPreview/btnCount? — id у кнопок: btnPreview, btnCalc, btnDownload, btnPDF)
      var idMap = { preview: 'btnPreview', count: 'btnCalc', download: 'btnDownload', pdf: 'btnPDF' };
      var btn = document.getElementById(idMap[base]);
      if (!btn) return;
      var normal = btn.querySelector('.img-normal');
      var hover  = btn.querySelector('.img-hover');
      if (normal) normal.src = base + '_' + th.btn[0] + '.png';
      if (hover)  hover.src  = base + '_' + th.btn[1] + '.png';
    });

    // подсветка активной кнопки темы
    var btns = document.querySelectorAll('.theme-btn');
    Array.prototype.forEach.call(btns, function (b) {
      b.classList.toggle('active', b.getAttribute('data-set') === name);
    });

    // запомнить выбор
    try { localStorage.setItem('sabos_theme', name); } catch (e) {}
  }

  // клики по кнопкам тем
  Array.prototype.forEach.call(document.querySelectorAll('.theme-btn'), function (b) {
    b.addEventListener('click', function () {
      applyTheme(b.getAttribute('data-set'));
    });
  });

  // восстановить тему из памяти (по умолчанию — светлая)
  var savedTheme = 'light';
  try { savedTheme = localStorage.getItem('sabos_theme') || 'light'; } catch (e) {}
  if (savedTheme === 'eye') savedTheme = 'light';   // тема «для глаз» временно отключена
  applyTheme(savedTheme);
  // предзагрузка тёмных вариантов кнопок (_2.png) при старте — чтобы не мигали при disabled
  ['preview_2.png','count_2.png','download_2.png','pdf_2.png'].forEach(function (src) {
    var im = new Image();
    im.src = src;
  });
})();
