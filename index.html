// ============================================================
// РЕЖИМ ВСТАВКИ СВОЕГО ЧЕРТЕЖА (скриншот/PNG) в поле #preview.
//   Активен ТОЛЬКО когда #preview пуст (после «Очистить»).
//   Ctrl+V или drag&drop PNG → картинка в окне чертежа.
//   «На согласование» вставляет картинку в бланк (таблица — как обычно).
//   Остальные кнопки (PDF / вектор / предпросмотр) → тост «недоступно».
// ============================================================
var PASTED_MODE = false;       // true, когда в #preview лежит вставленная картинка
var PASTED_IMG_DATA = null;    // dataURL вставленного PNG (для бланка)

function previewIsEmpty() {
  var pv = document.getElementById('preview');
  return pv && pv.innerHTML.trim() === '';
}

// Показать вставленную картинку в #preview + войти в режим вставки
function showPastedImage(dataURL) {
  var pv = document.getElementById('preview');
  if (!pv) return;
  PASTED_IMG_DATA = dataURL;
  PASTED_MODE = true;
  pv.innerHTML = '<img src="' + dataURL + '" alt="Вставленный чертёж" ' +
    'style="max-width:100%;max-height:100%;object-fit:contain;display:block;">';
  // кнопку смены цвета линий прячем — она для построенного чертежа
  var csBtn = document.getElementById('btnColorSwap');
  if (csBtn) csBtn.style.display = 'none';
}

// Выйти из режима вставки (вызывается при «Очистить»)
function exitPastedMode() {
  PASTED_MODE = false;
  PASTED_IMG_DATA = null;
}

// Только PNG (скриншот). Читаем File → dataURL, если это image/png.
function tryLoadPastedFile(file) {
  if (!file) return false;
  if (!/^image\/png$/i.test(file.type)) {
    showError('Вставлять можно только скриншот или PNG');
    return false;
  }
  var reader = new FileReader();
  reader.onload = function (ev) { showPastedImage(ev.target.result); };
  reader.onerror = function () { showError('Не удалось прочитать изображение'); };
  reader.readAsDataURL(file);
  return true;
}

// ── Ctrl+V (paste) на поле чертежа ──
(function () {
  var pv = document.getElementById('preview');
  if (!pv) return;

  // paste ловим на document, но реагируем ТОЛЬКО если поле пустое (вариант A)
  document.addEventListener('paste', function (e) {
    if (!previewIsEmpty()) return;               // есть чертёж → сначала «Очистить»
    var items = (e.clipboardData && e.clipboardData.items) || [];
    for (var i = 0; i < items.length; i++) {
      if (items[i].kind === 'file' && /^image\/png$/i.test(items[i].type)) {
        var file = items[i].getAsFile();
        if (tryLoadPastedFile(file)) e.preventDefault();
        return;
      }
    }
    // если в буфере картинка, но не PNG (например jpeg) — предупредим,
    // только когда пользователь явно пытался вставить изображение
    for (var j = 0; j < items.length; j++) {
      if (items[j].kind === 'file' && /^image\//i.test(items[j].type)) {
        showError('Вставлять можно только скриншот или PNG');
        e.preventDefault();
        return;
      }
    }
  });

  // ── drag&drop PNG в поле чертежа ──
  ['dragenter', 'dragover'].forEach(function (evt) {
    pv.addEventListener(evt, function (e) {
      if (!previewIsEmpty()) return;
      e.preventDefault();
      e.stopPropagation();
      pv.style.outline = '2px dashed #703D30';   // визуальный намёк
    });
  });
  ['dragleave', 'dragend'].forEach(function (evt) {
    pv.addEventListener(evt, function () { pv.style.outline = ''; });
  });
  pv.addEventListener('drop', function (e) {
    pv.style.outline = '';
    if (!previewIsEmpty()) { e.preventDefault(); return; }   // есть чертёж → игнор
    e.preventDefault();
    e.stopPropagation();
    var files = (e.dataTransfer && e.dataTransfer.files) || [];
    if (files.length) tryLoadPastedFile(files[0]);
  });
})();

// ── «Очистить» также выходит из режима вставки ──
// (основной обработчик btnClear уже стирает #preview; добавляем сброс флага)
(function () {
  var clearBtn = document.getElementById('btnClear');
  if (clearBtn) clearBtn.addEventListener('click', exitPastedMode);
})();

// ── Блокировка кнопок в режиме вставки: PDF / вектор / предпросмотр ──
(function () {
  var MSG = 'Недоступно в режиме вставленного чертежа';
  ['btnPDF', 'btnDownload', 'btnPreview'].forEach(function (id) {
    var b = document.getElementById(id);
    if (!b) return;
    // capture=true → перехватываем ДО «родных» обработчиков (generatePDF и т.д.)
    b.addEventListener('click', function (e) {
      if (PASTED_MODE) {
        e.preventDefault();
        e.stopImmediatePropagation();
        showError(MSG);
      }
    }, true);
  });
})();

// ============================================================
// «На согласование» для ВСТАВЛЕННОЙ картинки: PNG в зону бланка,
// таблица заполняется как обычно (кроме размеров заготовки).
// ============================================================
function generateAgreementPDFPasted() {
  var v = readBC(); if (!v) return;   // размеры/профиль/конструкция нужны для таблицы

  var blank = new Image();
  blank.onload = function () {
    var bw = blank.naturalWidth, bh = blank.naturalHeight;
    var canvas = document.createElement('canvas');
    canvas.width = bw; canvas.height = bh;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, bw, bh);
    ctx.drawImage(blank, 0, 0);   // бланк = подложка

    var draw = new Image();
    draw.onload = function () {
            // Учитываем поворот: при 90/270 меняем местами ширину/высоту для вписывания в зону.
            var dW = draw.naturalWidth, dH = draw.naturalHeight;
      var swap = (PASTED_ROT === 90 || PASTED_ROT === 270);
      var effW = swap ? dH : dW;   // габариты ПОВЁРНУТОЙ картинки
      var effH = swap ? dW : dH;
      var scale = Math.min(bw * AGREE_ZONE_W / effW, bh * AGREE_ZONE_H / effH);
      var outW = Math.round(effW * scale), outH = Math.round(effH * scale);
      var cx = bw / 2;                // центр зоны по X
      var cy = bh * AGREE_CY;         // центр зоны по Y (45%)
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(PASTED_ROT * Math.PI / 180);
      // рисуем исходную картинку в её натуральных пропорциях, вписанную по МЕНЬШЕЙ стороне
      var drawScale = Math.min(bw * AGREE_ZONE_W / effW, bh * AGREE_ZONE_H / effH);
      var natW = Math.round(dW * drawScale), natH = Math.round(dH * drawScale);
      ctx.drawImage(draw, -natW / 2, -natH / 2, natW, natH);
      ctx.restore();

      // ── ТАБЛИЦА (как в generateAgreementPDF, но БЕЗ размеров заготовки) ──
      (function () {
        var fs = Math.round(bh * 0.016);
        ctx.fillStyle = '#000';
        ctx.font = fs + "px 'TT Hoves', Arial, sans-serif";
        ctx.textBaseline = 'alphabetic';
        function put(txt, xFrac, yFrac) {
          if (txt == null || txt === '') return;
          ctx.fillText(String(txt), bw * xFrac, bh * yFrac);
        }
        var tClient = (document.getElementById('bcCompany').value || '').trim();
        var tInner  = v.l + 'х' + v.w + 'х' + v.h;
        var tName = (document.getElementById('bcProdName').value || '').trim() || tInner;
        var card = (document.getElementById('bcCardNum').value || '').replace(/\D+/g, '');
        var tArt = card ? card.padStart(6, '0') : '';
        var mk  = document.getElementById('bcMark').value;        if (!mk  || mk  === '-') mk  = '';
        var pf  = v.profile || '';                                if (pf === '-') pf = '';
        var cmp = document.getElementById('bcComposition').value; if (!cmp || cmp === '-') cmp = '';
        var tKarton = (mk + pf + (cmp ? ' ' + cmp : '')).trim();
        var tConstr = calcSel.value;

        var XL  = 0.393, XR1 = 0.740, XR = 0.645;
        var TBL_SHIFT_Y = 0.010;
        var Y1 = 0.840 + TBL_SHIFT_Y, Y2 = 0.862 + TBL_SHIFT_Y,
            Y3 = 0.884 + TBL_SHIFT_Y, Y4 = 0.9055 + TBL_SHIFT_Y;

        put('Клиент:' + (tClient ? ' ' + tClient : ''), XL,  Y1);
        put('Картон:' + (tKarton ? ' ' + tKarton : ''), XR1, Y1);
        put('Наименование изделия: ' + tName, XL, Y2);
        put('Артикул поставщика КИ:' + (tArt ? ' ' + tArt : ''), XR, Y2);
        put('Внутренние размеры, мм: ' + tInner, XL, Y3);
        put('Конструкция изделия: FEFCO ' + tConstr, XR, Y3);
        // размеры заготовки НЕ пишем (по требованию) — только подпись
        put('Размеры заготовки, мм: ', XL, Y4);
        put('Печать:',                 XR, Y4);
      })();

      var data;
      try {
        data = canvas.toDataURL('image/jpeg', 0.9);
      } catch (e) {
        console.error(e);
        showError('Браузер заблокировал бланк (file:// + canvas).');
        return;
      }
      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      pdf.addImage(data, 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
      var client = (document.getElementById('bcCompany').value || '').trim()
                   .replace(/[\\/:*?"<>|_]+/g, '').replace(/\s+/g, ' ').trim();
      pdf.save('Согласование ' + (client ? client + ' ' : '') + calcSel.value +
               ' (' + v.l + 'х' + v.w + 'х' + v.h + ')' + v.profile + '.pdf');
    };
    draw.onerror = function () { showError('Не удалось отрисовать вставленную картинку.'); };
    draw.src = PASTED_IMG_DATA;
  };
  blank.onerror = function () { showError('Не найден бланк agreementform.png'); };
  blank.src = AGREE_BLANK_B64 ? ('data:image/png;base64,' + AGREE_BLANK_B64) : 'agreementform.png';
}

// Показ/скрытие плейсхолдера: виден, только когда #preview ПУСТ (нет чертежа и нет вставки)
function syncPreviewHint() {
  var hint = document.getElementById('previewHint');
  if (!hint) return;
  if (ADD_HERE_B64 && hint.getAttribute('src') !== ADD_HERE_B64) hint.src = ADD_HERE_B64;
  hint.style.display = previewIsEmpty() ? '' : 'none';
}

// Показ/скрытие кнопок поворота: только в режиме вставки
function syncRotateBtns() {
  var box = document.getElementById('rotateBtns');
  if (!box) return;
  box.classList.toggle('visible', !!PASTED_MODE);
}

// Применить текущий угол к <img> внутри #preview (CSS transform)
function applyPastedRotation() {
  var pv = document.getElementById('preview');
  var img = pv && pv.querySelector('img');
  if (!img) return;
  img.style.transform = 'rotate(' + PASTED_ROT + 'deg)';
  img.style.transformOrigin = 'center center';
  // при 90/270 картинка вписывается по «повёрнутой» стороне — max-width/height:100% + contain
  // достаточно для превью; точное вписывание для бланка считается отдельно.
}

// Обёртка над showPastedImage: сбрасываем угол, синхронизируем UI
(function () {
  var _origShow = showPastedImage;
  showPastedImage = function (dataURL) {
    PASTED_ROT = 0;
    _origShow(dataURL);
    applyPastedRotation();
    syncPreviewHint();
    syncRotateBtns();
  };
  var _origExit = exitPastedMode;
  exitPastedMode = function () {
    PASTED_ROT = 0;
    _origExit();
    // exitPastedMode вызывается ПЕРЕД/вместе с очисткой #preview — обновим UI на след. тик
    setTimeout(function () { syncPreviewHint(); syncRotateBtns(); }, 0);
  };
})();

// Кнопки поворота
(function () {
  var ccw = document.getElementById('btnRotCCW');
  var cw  = document.getElementById('btnRotCW');
  function rot(delta) {
    if (!PASTED_MODE) return;
    PASTED_ROT = ((PASTED_ROT + delta) % 360 + 360) % 360;
    applyPastedRotation();
  }
  if (ccw) ccw.addEventListener('click', function () { rot(-90); });
  if (cw)  cw.addEventListener('click',  function () { rot(+90); });
})();

// Обновляем плейсхолдер при построении/очистке чертежа обычным флоу.
// previewBox() и generateBox()/btnClear пишут в #preview — вешаемся на клики кнопок.
['btnPreview', 'btnClear'].forEach(function (id) {
  var b = document.getElementById(id);
  if (b) b.addEventListener('click', function () {
    setTimeout(function () { syncPreviewHint(); syncRotateBtns(); }, 0);
  });
});

// стартовое состояние (при загрузке #preview пуст → плейсхолдер виден)
syncPreviewHint();
syncRotateBtns();

(function () {
  var card = document.getElementById('bcCardNum');
  if (!card) return;
  card.addEventListener('input', function () {
    var v = this.value.replace(/\D+/g, '').slice(0, 6);
    if (v !== this.value) this.value = v;
  });
})();

// ── ПЛОЩАДЬ ПО КОНТУРУ РЕЗА для 02XX (shoelace), м². Вектор не трогается. ──
function shoelace(pts) {
  var s = 0;
  for (var i = 0; i < pts.length; i++) {
    var a = pts[i], b = pts[(i + 1) % pts.length];
    s += a[0] * b[1] - b[0] * a[1];
  }
  return Math.abs(s) / 2;
}

// Площадь одной секции панелей (тело + верхние/нижние клапаны-зубцы) в мм².
// secXs=[xStart, ..., xEnd]; hasTop/hasBot — есть ли верхний/нижний ряд клапанов.
function area02Section(secXs, y0, y1, y2, y3, hasTop, hasBot) {
  var n = secXs.length - 1;
  function fl(i){ return (i === 0) ? secXs[i] : secXs[i] + SLOT_W/2; }
  function fr(i){ return (i === n-1) ? secXs[i+1] : secXs[i+1] - SLOT_W/2; }
  var area = 0;
  // тело секции (сплошной прямоугольник y1..y2 от xStart до xEnd)
  area += (secXs[n] - secXs[0]) * (y2 - y1);
  // клапаны-зубцы (каждый по реальной ширине — слоты вычтены автоматически)
  for (var i = 0; i < n; i++) {
    var w = fr(i) - fl(i);
    if (hasTop) area += w * (y1 - y0);   // верхний клапан
    if (hasBot) area += w * (y3 - y2);   // нижний клапан
  }
  return area;
}

// Площадь трапеции клеевого клапана (мм²): правый край GLUE (y1..y2), левый край 0 (y1+rise..y2-rise)
function areaGlueTrap(GLUE, y1, y2, slantRise) {
  return shoelace([
    [GLUE, y1],
    [0,    y1 + slantRise],
    [0,    y2 - slantRise],
    [GLUE, y2]
  ]);
}

// Площадь по контуру реза для 0409/0410 (м²). Вектор не трогается.
// kind: '0409' | '0410'
function cutArea04(l, w, h, kind) {
  var flapH = h + 2;
  var wallH = l + 3;
  var panels = [h + 2, w + 3, h + 3, w + 6, h + 2];
  var y0 = 0, y1 = flapH, y2 = flapH + wallH, y3 = flapH * 2 + wallH;
  var n = panels.length;
  var xs = [0];
  for (var p = 0; p < n; p++) xs.push(xs[xs.length - 1] + panels[p]);
  var lastSeg = n - 1;   // у 0410 — без клапанов

  function fl(i){ return (i === 0) ? xs[i] : xs[i] + SLOT_W/2; }
  function fr(i){ return (i === n-1) ? xs[i+1] : xs[i+1] - SLOT_W/2; }

  var area = 0;
  // тело (сплошной прямоугольник y1..y2 на всю ширину)
  area += (xs[n] - xs[0]) * (y2 - y1);
  // клапаны-зубцы (верх/низ), слоты вычтены
  for (var i = 0; i < n; i++) {
    if (kind === '0410' && i === lastSeg) continue;  // 5-я панель без клапанов
    var wi = fr(i) - fl(i);
    area += wi * (y1 - y0);   // верхний
    area += wi * (y3 - y2);   // нижний
  }
  return area / 1000000;
}

// ── Площадь по контуру для 0427 (инженерный B1, дуги ×8, м²). build0427 не трогается. ──
function cutArea0427(l, w, h, profile) {
  h = Math.max(h, 25);
  var PI = Math.PI;
  var R110 = h + 5, R20 = R110 / 5, R4 = 4, LEDGE = 10, KEY_OUT = 5;
  var side1 = h + 4, side2 = h + 2;
  var BODY_GREEN_DELTA = (profile === 'B') ? 24 : 0;
  var body = (l + 3) + BODY_GREEN_DELTA;

  // Y-ярусы (как в build0427)
  var yEar = h + 1, yShldr = w + 8, yBody = h + 3, yHgt = w + 6, yBot = h + 2;

  // 1) ТЕЛО (прямоугольник body × (Y1..Y4) = плечо+тело+клапан высоты)
  var bodyArea = body * (yShldr + yBody + yHgt);

  // 2) УХО (Q3): купол R110 + R20 + касательная + R4, замкнутое под ОДНИМ ухом.
  //    Аналитика по слайсам оси Y от Y0 до Y1 (yEar), дуги ×8.
  //    Приближение: сектор купола R110 (~от вершины) + треугольник касательной + R4 полукруг.
  //    S_ear ≈ полукруг R110-сегмент + прямоуг. основание.
  function earArea() {
    // высота уха = yEar; ширина основания уха ≈ 2*(проекция купола) ≈ примем по R20-касательной.
    // Инженерно: ухо ≈ прямоугольник (2*R20 + R110*0.6) × yEar, минус угловые скругления.
    var baseW = R110 * 0.55 + R20 * 2;          // ширина основания уха (эмпирика под R110/R20)
    var rect = baseW * yEar;
    var domeTop = PI * R20 * R20 / 2;            // носик R20 (полукруг)
    var slot = PI * R4 * R4 / 2;                 // R4 полукруг (выступ наружу — картон)
    return rect * 0.72 + domeTop + slot;         // 0.72 — коэф скошенности купола
  }
  var earA = earArea() * 2;                      // 2 уха

  // 3) ПЛЕЧО (зеркало верхушки уха, Y1..Y2): ≈ то же, но на ярусе yShldr
  //    В build0427 плечо = зеркальный R20+касательная. Инженерно ≈ ухо*0.6.
  var shldrExtra = earArea() * 0.6 * 2;

  // 4) ПОЛКИ (Y2..Y3 и Y3..Y4): side1 + LEDGE + side2, с обеих сторон, минус R4c скругления
  var R4c = (profile === 'B') ? 4 : 0;
  function shelfPair(spanY) {
    var one = (side1 + LEDGE + side2) * spanY;
    one -= 2 * (4 - PI) / 4 * R4c * R4c;          // 2 угла R4c на полку
    return one * 2;                                // левая + правая
  }
  var shelvesA = shelfPair(yBody) + shelfPair(yHgt);

  // 5) ЗАМКИ keyOut (4 шт на Y3..Y4): трапеция основание lockH, вершина lockH-2, вылет 5
  var lockN = (w <= 130) ? 1 : 2;
  var lockH = (function(){
    if (w<=130) return 30; if (w<=180) return 35; if (w<=250) return 45; if (w<=300) return 55;
    if (w<=350) return 60; if (w<=400) return 65; if (w<=450) return 75; if (w<=500) return 80;
    if (w<=550) return 85; if (w<=600) return 90; if (w<=650) return 95; if (w<=700) return 110;
    return 140;
  })();
  var lockOne = (lockH + (lockH - 2)) / 2 * KEY_OUT;   // трапеция
  var locksA = lockOne * lockN * 4;                    // 2 стороны × 2 яруса? нет: 4 грани s2 (лев/прав, но 1 ярус) → lockN*2 сторон
  locksA = lockOne * lockN * 2;                        // левая s2L + правая s2R (ярус Y3..Y4)

  // 6) НИЖНИЙ КЛАПАН (Y4..Y5): трапеция (диагонали 3×6) + полки до s1
  var IN = (profile === 'B') ? 6 : 0, UP = (profile === 'B') ? 3 : 0;
  var flapMid = (body - 2*IN) * (yBot - UP);           // центральная часть
  var flapDiag = 2 * (IN * (yBot - UP) / 2);           // 2 диагональных треугольника
  var flapShelf = 2 * (side1 * (yBot - UP));           // полки влево/вправо
  var bottomA = flapMid + flapDiag + flapShelf;

  // 7) ВЫРЕЗЫ: 2 отверстия под замок (roundRectHole 10×(lockH+1), R2) × lockN
  var holeW = 10, holeH = lockH + 1, holeR = 2;
  var holeOne = holeW * holeH - (4 - PI) * holeR * holeR;
  var holesA = holeOne * lockN * 2;                    // левая XbL + правая XbR

  var total = bodyArea + earA + shldrExtra + shelvesA + locksA + bottomA - holesA;
  return total / 1000000;
}

// ── Площадь по контуру для 0422 (инженерный B1, м²). build0422 не трогается. ──
function cutArea0422(l, w, h, profile) {
  h = Math.max(h, 25);
  var PI = Math.PI;
  var LEDGE = 10, KEY_OUT = 5, side1 = h + 4, side2 = h + 2;
  var BODY_GREEN_DELTA = (profile === 'B') ? 17 : 0;
  var body = (l + 3) + BODY_GREEN_DELTA;
  var yHgt = w + 9, yBot = h - 1;

  // 1) ТЕЛО (body × yHgt)
  var bodyArea = body * yHgt;

  // 2) ПОЛКИ (Y3..Y4, span=yHgt): side1+LEDGE+side2 с двух сторон, − R4c
  var R4c = (profile === 'B') ? 4 : 0;
  var shelfOne = (side1 + LEDGE + side2) * yHgt - 2 * (4 - PI) / 4 * R4c * R4c;
  var shelvesA = shelfOne * 2;

  // 3) ЗАМКИ keyOut (ярус Y3..Y4, лев+прав)
  var lockN = (w <= 130) ? 1 : 2;
  var lockH = (function(){
    if (w<=130) return 30; if (w<=180) return 35; if (w<=250) return 45; if (w<=300) return 55;
    if (w<=350) return 60; if (w<=400) return 65; if (w<=450) return 75; if (w<=500) return 80;
    if (w<=550) return 85; if (w<=600) return 90; if (w<=650) return 95; if (w<=700) return 110;
    return 140;
  })();
  var lockOne = (lockH + (lockH - 2)) / 2 * KEY_OUT;
  var locksA = lockOne * lockN * 2;

  // 4) КЛАПАНЫ (верхний Y0..Y3 + нижний Y4..Y5): 2 шт, трапеция W/2 с ограничением
  var IN = (profile === 'B') ? 6 : 0;
  var s2lim = side1 + LEDGE + side2 + KEY_OUT;
  var flapW = Math.min(w / 2, s2lim);                  // вылет клапана в стороны
  var flapOne = (body - 2*IN + 2*flapW) * yBot;        // трапеция клапана (приближение прямоуг.)
  var flapsA = flapOne * 2;

  // 5) ВЫРЕЗЫ: отверстия под замок + д8 (Q4: д8 = наружный вырез, вычитаем)
  var holeW = 10, holeH = lockH + 1, holeR = 2;
  var holeOne = holeW * holeH - (4 - PI) * holeR * holeR;
  var holesA = holeOne * lockN * 2;
  // д8: появляется если клапан вылез за полку ≥4мм → 4 дуги R4c (по одной на угол полки)
  var d8Cut = 0;
  if (profile === 'B') {
    var s1L = -side1, xOutL = Math.min(IN - w/2, -(side1+LEDGE+side2+KEY_OUT));
    var past = (s1L - xOutL);
    if (past >= 4) d8Cut = (PI * R4c * R4c / 2) * 4;   // 4 полукруга д8 (верх/низ × лев/прав)
  }

  var total = bodyArea + shelvesA + locksA + flapsA - holesA - d8Cut;
  return total / 1000000;
}



// Итоговая площадь по контуру реза для 02XX (м²).
// d — результат calc0200/calc0201/calc0203; kind: '0200' | '0201' | '0203'
function cutArea02(d, kind) {
  var GLUE = d.GLUE, flapH = d.flapH, wallH = d.wallH, panels = d.panels, slantRise = d.slantRise;
  var hasTop = (kind !== '0200');       // у 0200 верхних клапанов нет
  var areaMM = 0;

  if (d.twoHalves) {
    // ── ДВЕ ПОЛОВИНЫ ── (координаты как в buildSVG0201/buildSVG0200Halves)
    var y0 = 0, y1 = flapH, y2 = flapH + wallH, y3 = flapH * 2 + wallH;
    if (kind === '0200') { y1 = 0; y2 = wallH; y3 = wallH + flapH; }
    var W = panels[0], Lp = panels[1];
    var xs = [GLUE, GLUE + W, GLUE + W + Lp];
    var firstEnd = xs[2];
    var x2W = firstEnd, x2L = x2W + W, x2End = x2L + Lp;

    // клеевой клапан первой половины (реальный картон)
    areaMM += areaGlueTrap(GLUE, y1, y2, slantRise);
    // первая половина: панели [GLUE, W, L]
    areaMM += area02Section([GLUE, xs[1], xs[2]], y0, y1, y2, y3, hasTop, true);
    // вторая половина: панели [W, L] (её клеевой клапан НАЛОЖЕН на L первой → не считаем)
    areaMM += area02Section([x2W, x2L, x2End], y0, y1, y2, y3, hasTop, true);

  } else {
    // ── ПОЛНЫЙ КОРОБ ──
    var y0f = 0, y1f = flapH, y2f = flapH + wallH, y3f = flapH * 2 + wallH;
    if (kind === '0200') { y1f = 0; y2f = wallH; y3f = wallH + flapH; }
    var xs2 = [GLUE];
    for (var p = 0; p < panels.length; p++) xs2.push(xs2[xs2.length - 1] + panels[p]);

    areaMM += areaGlueTrap(GLUE, y1f, y2f, slantRise);
    areaMM += area02Section(xs2, y0f, y1f, y2f, y3f, hasTop, true);
  }

  return areaMM / 1000000;   // мм² → м²
}

                        // ── АККОРДЕОН «Расширенные настройки» + тогл «Строить из 2-х половин» ──

                     // строка «Строить из 2-х половин» видна ВСЕГДА; тогл НЕ сереет.
                // При включении на неподходящей конструкции → красная ошибка снизу + откат.
                function updateTwoHalvesRow() {

            // конструкцию сменили на неподходящую, а тогл был включён — тихо выключаем

                         // раскрытие/сворачивание островка (класс на САМ островок)
                         var constructorIsle = document.getElementById('constructorIsle');
        var isleBase = constructorIsle ? constructorIsle.querySelector('.isle-base') : null;
        // фиксируем высоту островка по высоте базового блока (полей),
        // чтобы серая Г-полоса корректно легла снизу, а рост вниз работал через padding-bottom
        function lockIsleHeight() {
          if (constructorIsle && isleBase) {
            var baseH = isleBase.offsetHeight;
            var mm = (function () {
              var d = document.createElement('div');
              d.style.cssText = 'width:100mm;position:absolute;visibility:hidden;';
              document.body.appendChild(d);
              var px = d.offsetWidth / 100;
              document.body.removeChild(d);
              return px;
            })();
            var growDown = 73 * mm + 50;
            // нижняя полоса островка = правой полосе (--adv-bar-bottom), чтобы отступ снизу = справа
            var barBottom = parseFloat(getComputedStyle(constructorIsle).getPropertyValue('--adv-bar-bottom')) || 40;
            var open = constructorIsle.classList.contains('adv-open');
            // высота скрываемого блока (Поддон/Кратность/Штамп) + один межстрочный gap
            var extraEl = document.getElementById('isleExtra');
            var gapPx = parseFloat(getComputedStyle(isleBase).rowGap) || 20;
            var extraH = extraEl ? (extraEl.offsetHeight + gapPx) : 0;
            // ЗАКРЫТАЯ высота = поля БЕЗ доп. блока + нижняя полоса
            var closedH = (baseH - extraH) + barBottom;
            // ОТКРЫТАЯ = хватает и на доп. поля слева, и на секции справа
            var openH = Math.max(baseH + barBottom, closedH + growDown);
            constructorIsle.style.height = (open ? openH : closedH) + 'px';

// ── ШИРИНА раскрытия: по факту контента правой колонки.
//    Правый отступ = --isle-pad (28px) — как слева от края до текста.
var padR = parseFloat(getComputedStyle(constructorIsle).getPropertyValue('--isle-pad')) || 28;
if (open) {
  var advInnerEl = document.getElementById('advInner');
  if (advInnerEl) {
    var maxW = 0;
    var secs = advInnerEl.querySelectorAll('.adv-section');
    for (var si = 0; si < secs.length; si++) {
      maxW = Math.max(maxW, secs[si].offsetWidth);
    }
    constructorIsle.style.width = (advInnerEl.offsetLeft + maxW + padR) + 'px';
  }
} else {
  constructorIsle.style.width = '';   // закрытая ширина — из CSS
}

            // holder держит ЗАКРЫТУЮ высоту → элементы под островком не прыгают
            var holder = document.getElementById('isleHolder');
            if (holder) holder.style.height = closedH + 'px';
          }
          drawAdvLines();
        }
        // Линия-граница Г-зоны кнопки: штрих 10мм / пропуск 10мм, отступ GAP=10мм со всех сторон.
        // При раскрытии остаётся вокруг ЗАКРЫТОГО размера базы (не убегает).
        function drawAdvLines() {
          var svg = constructorIsle ? constructorIsle.querySelector('.adv-lines') : null;
          if (!svg || !isleBase) return;

          // 1мм в px (учитываем zoom)
          var mm = (function () {
            var d = document.createElement('div');
            d.style.cssText = 'width:100mm;position:absolute;visibility:hidden;';
            document.body.appendChild(d);
            var px = d.offsetWidth / 100;
            document.body.removeChild(d);
            return px;
          })();

          // ⚠️ СНАЧАЛА объявляем bar/barBottom, ПОТОМ считаем W/H
          var bar       = parseFloat(getComputedStyle(constructorIsle).getPropertyValue('--adv-bar')) || 40;
          var barBottom = parseFloat(getComputedStyle(constructorIsle).getPropertyValue('--adv-bar-bottom')) || bar;

          // Г-зона всегда вокруг ЗАКРЫТОГО размера базы (при раскрытии не убегает)
          var baseW = isleBase.offsetWidth;
          var baseH = isleBase.offsetHeight;
          var W = baseW + bar;
          var H = baseH + barBottom;

          var GAP  = 10 * mm;   // ОДИНАКОВЫЙ отступ от концов (10мм)
          var DASH = 10 * mm;   // штрих 10мм
          var SPACE= 10 * mm;   // пропуск 10мм
          var R    = 10 * mm;   // радиус стыка (полукруг)

          // линия по стыку: вертикаль X=W-bar, горизонталь Y=H-barBottom
          var vx = W - bar;
          var hy = H - barBottom;

          // защита от кривых размеров
          if (W <= 0 || H <= 0 || vx <= GAP || hy <= GAP) { svg.innerHTML = ''; return; }

          svg.setAttribute('width', W);
          svg.setAttribute('height', H);
          svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

                    // прямой угол (без дуги): вертикаль вниз до стыка → горизонталь влево
                    var d =
            'M ' + vx + ' ' + GAP +
            ' L ' + vx + ' ' + hy +
            ' L ' + GAP + ' ' + hy;

            svg.innerHTML =
            '<path d="' + d + '" fill="none" stroke="#b0b0b0" ' +
            'stroke-width="1.5" stroke-linecap="butt" stroke-linejoin="miter" />';
        }

        lockIsleHeight();
        window.addEventListener('resize', lockIsleHeight);

        function toggleAdv(e) {
          if (e) e.stopPropagation();
          var open = constructorIsle.classList.toggle('adv-open');
          if (advHead) advHead.setAttribute('aria-expanded', open ? 'true' : 'false');
          lockIsleHeight();   // пересчёт высоты + перерисовка линии
        }
        if (advCorner && constructorIsle) {
          advCorner.style.pointerEvents = 'auto';   // страховка: клик по стрелке всегда активен
          advCorner.addEventListener('click', toggleAdv);
        }

        if (halvesToggle) halvesToggle.addEventListener('change', function () {
  var okConstr = TWO_HALVES_CONSTR.indexOf(calcSel.value) !== -1;
  // 0200 из двух половин пока не поддержан
  if (halvesToggle.checked && calcSel.value === '0200') {
    showError('0200 из двух половин пока недоступно');
    halvesToggle.checked = false;
    FORCE_TWO_HALVES = false;
    return;
  }
  if (halvesToggle.checked && !okConstr) {
    showError('«Строить из 2-х половин» доступно только для 0200 / 0201 / 0203');
    halvesToggle.checked = false;
    FORCE_TWO_HALVES = false;
    return;
  }
  FORCE_TWO_HALVES = okConstr && halvesToggle.checked;
  if (document.getElementById('preview').innerHTML.trim()) previewBox();
  if (document.getElementById('resL').value) calcDevelopment();
});

                // «Клапан вручную, мм»: только цифры, максимум 3 символа, >100 → 100.
                var flapManualEl = document.getElementById('flapManualMM');
        if (flapManualEl) {
          function redrawByFlap() {
            if (document.getElementById('preview').innerHTML.trim()) previewBox();
            if (document.getElementById('resL').value) calcDevelopment();
          }
          flapManualEl.addEventListener('input', function () {
            // клапан вручную доступен ТОЛЬКО на 02ХХ (0200/0201/0203)
            if (TWO_HALVES_CONSTR.indexOf(calcSel.value) === -1) {
              showError('Клапан вручную доступен только для 0200 / 0201 / 0203');
              this.value = '';
              redrawByFlap();
              return;
            }
            var v = this.value.replace(/\D+/g, '');       // только цифры
            if (v.length > 3) v = v.slice(0, 3);          // максимум 3 символа
            if (v !== '' && parseInt(v, 10) > 70) v = '70';   // >70 → 70
            if (v !== this.value) this.value = v;
            redrawByFlap();
          });
          flapManualEl.addEventListener('blur', function () {
            var v = this.value.replace(/\D+/g, '');
            if (v === '') { this.value = ''; redrawByFlap(); return; }
            var n = parseInt(v, 10);
            if (n > 70) n = 70;
            if (n < 25)  n = 25;                           // нижняя граница по blur
            this.value = String(n);
            redrawByFlap();
          });
        }

                // «Уложить на штамп»: при выборе раскладки и конструкции 02XX — включить «Чертеж на штамп»
                var layoutStampEl = document.getElementById('layoutStamp');
        var drawStampEl   = document.getElementById('toggleDrawStamp');
        if (layoutStampEl) {
          // авто-включение «Чертеж на штамп» отключено — тогл временно недоступен
          layoutStampEl.addEventListener('change', function () { /* нет действий */ });
        }
        // «Чертеж на штамп» — ВРЕМЕННО НЕДОСТУПНО: не включается, показывает ошибку
        if (drawStampEl) {
          drawStampEl.addEventListener('change', function () {
            if (this.checked) {
              showError('Временно недоступно');
              this.checked = false;
            }
          });
        }

                // при смене конструкции — пересчитать видимость строки половинок
                calcSel.addEventListener('change', updateTwoHalvesRow);
        // ушли с 02ХХ → очищаем поле «Клапан вручную»
        calcSel.addEventListener('change', function () {
          if (TWO_HALVES_CONSTR.indexOf(calcSel.value) === -1) {
            var fm = document.getElementById('flapManualMM');
            if (fm && fm.value) {
              fm.value = '';
              if (document.getElementById('preview').innerHTML.trim()) previewBox();
              if (document.getElementById('resL').value) calcDevelopment();
            }
          }
        });

        // выставить доступность профилей и кнопок под стартовую конструкцию
        updateProfileAvailability();
  updatePreviewButtons();
  updateTwoHalvesRow();
  renderResults(null);   // показать пустые блоки "Заготовка" и "Поддон" сразу
  renderPalletFormulas(null);   // подсказка в белом окне до первого расчёта

   // ── Тоглы «Замки» и «Отверстие под палец»: ВРЕМЕННО НЕДОСТУПНЫ ──
   (function () {
    var locksEl  = document.getElementById('toggleLocks');
    var fingerEl = document.getElementById('toggleFingerHole');

    function tempDisabled(el) {
      if (!el) return;
      el.addEventListener('change', function () {
        if (this.checked) {
          showError('Временно недоступно');
          this.checked = false;
        }

    tempDisabled(locksEl);
    tempDisabled(fingerEl);

  // ── Тоглы C/C полки перегиба (5х5 / 10х10): взаимоисключение + мгновенная перерисовка ──
  (function () {
    var t5  = document.getElementById('toggleShelf5');
    var t10 = document.getElementById('toggleShelf10');
    if (!t5 || !t10) return;

    var CC_CONSTR = ['0422', '0427'];   // конструкции с полкой перегиба

    function redrawCC() {
      if (PASTED_MODE) return;                                    // вставленную картинку не трогаем
      if (document.getElementById('preview').innerHTML.trim()) previewBox();
    }
    function bindCC(self, other, name) {
      self.addEventListener('change', function () {
        if (this.checked && CC_CONSTR.indexOf(calcSel.value) === -1) {
          showError(name + ' доступно только для 0422 / 0427');
          this.checked = false;
          return;
        }
        if (this.checked && other.checked) other.checked = false; // взаимоисключение: 5х5 ⟷ 10х10
        redrawCC();
      });
    }
    bindCC(t5,  t10, 'Полка перегиба С/С 5х5');
    bindCC(t10, t5,  'Полка перегиба С/С 10х10');

    // ушли с 0422/0427 → выключаем оба тогла
    calcSel.addEventListener('change', function () {
      if (CC_CONSTR.indexOf(calcSel.value) === -1) {
        if (t5.checked)  t5.checked  = false;
        if (t10.checked) t10.checked = false;
      }
    });
  })();

  // ── ВРЕМЕННО: кнопка отладки тостов (рандомная ошибка) ──
  (function () {
    var dbg = document.getElementById('btnDebugErr');
    if (!dbg) return;
    var MSGS = [
      'Введите все размеры!',
      'Этот профиль пока недоступен.',
      'Для 0427 недопустимые размеры',
      'Не удалось отрисовать чертёж для PDF.',
      'Высота не может быть больше ширины',
      'Ошибка расчёта развёртки'
    ];
    dbg.addEventListener('click', function () {
      var m = MSGS[Math.floor(Math.random() * MSGS.length)];
      showError(m + ' (#' + Math.floor(Math.random() * 900 + 100) + ')');
    });
  })();
  // ── ПЕРЕКЛЮЧЕНИЕ ТЕМЫ ──
  function applyTheme(name) {
    var th = THEME_IMG[name] || THEME_IMG.light;
    document.body.setAttribute('data-theme', name);

    // layout.png справа
    var layoutImg = document.querySelector('.right-bg .box-shape');
    if (layoutImg) layoutImg.src = th.layout;

    // кнопки-картинки: normal = _<n[0]>.png, hover = _<n[1]>.png
    BTN_BASES.forEach(function (base) {
      // находим кнопку по id (btnPreview/btnCount? — id у кнопок: btnPreview, btnCalc, btnDownload, btnPDF)
      var idMap = { preview: 'btnPreview', count: 'btnCalc', download: 'btnDownload', pdf: 'btnPDF' };
      var btn = document.getElementById(idMap[base]);
      if (!btn) return;
      var normal = btn.querySelector('.img-normal');
      var hover  = btn.querySelector('.img-hover');
      if (normal) normal.src = base + '_' + th.btn[0] + '.png';
      if (hover)  hover.src  = base + '_' + th.btn[1] + '.png';
    });

    // подсветка активной кнопки темы
    var btns = document.querySelectorAll('.theme-btn');
    Array.prototype.forEach.call(btns, function (b) {
      b.classList.toggle('active', b.getAttribute('data-set') === name);
    });

    // запомнить выбор
    try { localStorage.setItem('sabos_theme', name); } catch (e) {}
  }

    // Тема ВСЕГДА светлая (переключатель убран)
  applyTheme('light');
  // предзагрузка тёмных вариантов кнопок (_2.png) при старте — чтобы не мигали при disabled
  ['preview_2.png','count_2.png','download_2.png','pdf_2.png'].forEach(function (src) {

  // ── ГАРАНТИРОВАННЫЙ показ плейсхолдера add_here.png при старте ──
  // (в самом конце IIFE — если что-то выше упало, сюда всё равно дойдём при отсутствии throw)
  (function () {
    var hint = document.getElementById('previewHint');
    var pv = document.getElementById('preview');
    if (hint && pv) {
      if (ADD_HERE_B64 && hint.getAttribute('src') !== ADD_HERE_B64) hint.src = ADD_HERE_B64;
      hint.style.display = (pv.innerHTML.trim() === '') ? '' : 'none';
    }
  })();
})();
